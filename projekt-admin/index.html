<!DOCTYPE html>
<html lang="de-CH">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Projekt Admin | POLYCORE GmbH</title>
<link rel="icon" href="/assets/img/favicon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bx:#4a0e1a;--ink:#0a0a0a;--muted:#666;--border:#e4e4e4;--bg:#f8f7f5}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.lbox{background:#fff;border-radius:16px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.08);text-align:center}
.lbox img{width:140px;margin-bottom:1.5rem}
.lbox h2{font-size:1.2rem;font-weight:700;margin-bottom:.3rem}
.lbox p{font-size:.83rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.6}
.fi{width:100%;padding:.75rem 1rem;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;font-family:inherit;outline:none;margin-bottom:.75rem;display:block}
.fi:focus{border-color:var(--bx)}
.btn-lg{width:100%;padding:.8rem;background:var(--bx);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:.25rem}
.btn-lg:hover{background:#3a0a14}
.err{color:#c0392b;font-size:.8rem;margin-top:.5rem;display:none}
#app-screen{display:none}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--ink);padding:1.5rem;overflow-y:auto}
.sidebar img{width:110px;margin-bottom:2rem;opacity:.9}
.slbl{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:.5rem;padding-left:.5rem}
.sbtn{display:flex;align-items:center;gap:.6rem;width:100%;padding:.65rem .75rem;border-radius:8px;border:none;background:none;color:rgba(255,255,255,.65);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;text-align:left;margin-bottom:.2rem}
.sbtn:hover{background:rgba(255,255,255,.08);color:#fff}
.sdiv{height:1px;background:rgba(255,255,255,.08);margin:1rem 0}
.pitem{display:flex;align-items:center;gap:.6rem;padding:.6rem .75rem;border-radius:8px;cursor:pointer;margin-bottom:.15rem}
.pitem:hover{background:rgba(255,255,255,.06)}
.pitem.act{background:rgba(74,14,26,.5)}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pdot.active{background:#4caf50}.pdot.done{background:rgba(255,255,255,.3)}.pdot.paused{background:#ff9800}
.pname{font-size:.78rem;color:rgba(255,255,255,.7);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pitem.act .pname{color:#fff}
.main{margin-left:260px;padding:2rem;min-height:100vh}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;gap:1rem;flex-wrap:wrap}
.mt{font-size:1.4rem;font-weight:700;letter-spacing:-.03em}
.btn{padding:.6rem 1.2rem;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;font-family:inherit;display:inline-flex;align-items:center;gap:.4rem}
.bd{background:var(--ink);color:#fff}.bd:hover{background:var(--bx)}
.bb{background:var(--bx);color:#fff}.bb:hover{background:#3a0a14}
.bo{border:1.5px solid var(--border);background:#fff;color:var(--ink)}
.bdel{background:#fee;color:#c0392b;border:1.5px solid #fcc}
.card{background:#fff;border-radius:12px;padding:1.5rem;border:1px solid var(--border);margin-bottom:1.25rem}
.ct2{font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between}
.fg{margin-bottom:1rem}
.fl{display:block;font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:.35rem}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.fi2{margin-bottom:0}
select{cursor:pointer}
textarea.fi,textarea.fi2{resize:vertical;min-height:80px}
.ec{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:.75rem}
.eh{display:flex;align-items:center;gap:.75rem;cursor:pointer}
.en{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.etname{font-size:.9rem;font-weight:600;flex:1}
.sp{font-size:.65rem;font-weight:700;padding:.2rem .6rem;border-radius:50px;text-transform:uppercase}
.sp.completed{background:#e8f5e9;color:#2e7d32}
.sp.active{background:#fff3e0;color:#e65100}
.sp.pending{background:#f5f5f5;color:#666}
.eb{display:none;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
.eb.open{display:block}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:.5rem;margin-top:.5rem}
.ft{position:relative;aspect-ratio:4/3;border-radius:6px;overflow:hidden;background:#f0f0f0}
.ft img{width:100%;height:100%;object-fit:cover}
.fdel{position:absolute;top:.2rem;right:.2rem;background:rgba(0,0,0,.6);color:#fff;border:none;width:18px;height:18px;border-radius:50%;cursor:pointer;font-size:.6rem;display:flex;align-items:center;justify-content:center}
.fadd{aspect-ratio:4/3;border-radius:6px;border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:.3rem;background:#fff}
.fadd:hover{border-color:var(--bx)}
.fadd span{font-size:.6rem;color:var(--muted)}
.lbx{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.lurl{font-size:.75rem;font-family:monospace;color:var(--bx);flex:1;word-break:break-all}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--ink);color:#fff;padding:.75rem 1.25rem;border-radius:8px;font-size:.82rem;font-weight:600;opacity:0;transform:translateY(10px);transition:all .3s;z-index:9999;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:#2e7d32}
.toast.err{background:#c0392b}
.empty{text-align:center;padding:4rem;color:var(--muted)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lbox">
    <img src="/assets/img/PolyCoreLogo.png" alt="POLYCORE"/>
    <h2>Projekt Admin</h2>
    <p>Baustellenberichte erstellen und verwalten</p>
    <label class="fl" style="text-align:left">Admin-Passwort</label>
    <input class="fi" type="password" id="f-pw" placeholder="polycore2026"/>
    <label class="fl" style="text-align:left;margin-top:.5rem">GitHub Personal Access Token</label>
    <input class="fi" type="password" id="f-tok" placeholder="ghp_xxxxxxxxxxxx"/>
    <p style="font-size:.7rem;color:var(--muted);text-align:left;margin-bottom:1rem;line-height:1.5">GitHub &rarr; Settings &rarr; Developer settings &rarr; Personal access tokens (classic) &rarr; Scope: <strong>repo</strong></p>
    <button class="btn-lg" id="login-btn">Einloggen</button>
    <div class="err" id="login-err">Falsches Passwort oder Token fehlt.</div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="sidebar">
    <img src="/assets/img/1PolyCoreLogo.png" alt="POLYCORE"/>
    <div class="slbl">Projekte</div>
    <div id="proj-list"></div>
    <div class="sdiv"></div>
    <button class="sbtn" id="btn-new">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Neues Projekt
    </button>
    <button class="sbtn" id="btn-logout">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Abmelden
    </button>
  </div>
  <div class="main" id="main-content">
    <div class="empty"><h3>Kein Projekt ausgewahlt</h3><p style="margin-top:.5rem">Links ein Projekt wahlen oder neues erstellen.</p></div>
  </div>
</div>

<div class="toast" id="toast-el"></div>

<script>
// ======= CONFIG =======
var ADMIN_PW = 'polycore2026';
var REPO = 'mevi977/PolyCoreWeb';
var BRANCH = 'main';
var ghTok = '';
var allProjects = {};
var activSlug = '';

// ======= TOAST =======
function showToast(msg, type) {
  var el = document.getElementById('toast-el');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(function() { el.className = 'toast'; }, 2500);
}

// ======= GITHUB API =======
function ghFetch(path, method, body) {
  var opts = {
    method: method || 'GET',
    headers: {
      'Authorization': 'token ' + ghTok,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  return fetch('https://api.github.com/repos/' + REPO + '/contents/' + path, opts)
    .then(function(r) {
      if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
      return r.json();
    });
}

function decodeB64(str) {
  var clean = str.replace(/\n/g, '');
  var bytes = Uint8Array.from(atob(clean), function(c) { return c.charCodeAt(0); });
  return new TextDecoder().decode(bytes);
}

function encodeContent(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

function ghPut(path, content, message, sha) {
  var body = { message: message, content: encodeContent(content), branch: BRANCH };
  if (sha) body.sha = sha;
  return ghFetch(path, 'PUT', body);
}

// ======= LOGIN =======
document.getElementById('login-btn').addEventListener('click', function() {
  var pw = document.getElementById('f-pw').value;
  var tok = document.getElementById('f-tok').value.trim();
  var errEl = document.getElementById('login-err');
  
  if (pw !== ADMIN_PW) {
    errEl.style.display = 'block';
    errEl.textContent = 'Falsches Passwort!';
    return;
  }
  if (!tok) {
    errEl.style.display = 'block';
    errEl.textContent = 'Bitte GitHub Token eingeben!';
    return;
  }
  
  errEl.style.display = 'none';
  ghTok = tok;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  loadProjects();
});

document.getElementById('f-pw').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});
document.getElementById('f-tok').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

document.getElementById('btn-logout').addEventListener('click', function() {
  location.reload();
});

document.getElementById('btn-new').addEventListener('click', showNewProject);

// ======= PROJECTS =======
function loadProjects() {
  ghFetch('bericht/projekte.json')
    .then(function(f) {
      allProjects = JSON.parse(decodeB64(f.content));
      renderSidebar();
    })
    .catch(function() {
      allProjects = {};
      renderSidebar();
    });
}

function saveProjects(callback) {
  ghFetch('bericht/projekte.json')
    .then(function(f) { return f.sha; })
    .catch(function() { return null; })
    .then(function(sha) {
      return ghPut('bericht/projekte.json', JSON.stringify(allProjects, null, 2), 'Projekte aktualisiert', sha);
    })
    .then(function() {
      if (callback) callback();
    })
    .catch(function(e) {
      showToast('Fehler: ' + e.message, 'err');
    });
}

function renderSidebar() {
  var el = document.getElementById('proj-list');
  var slugs = Object.keys(allProjects).sort(function(a, b) {
    return (allProjects[b].updated || '').localeCompare(allProjects[a].updated || '');
  });
  
  if (!slugs.length) {
    el.innerHTML = '<div style="font-size:.75rem;color:rgba(255,255,255,.3);padding:.5rem">Noch keine Projekte</div>';
    return;
  }
  
  el.innerHTML = slugs.map(function(s) {
    var p = allProjects[s];
    return '<div class="pitem' + (s === activSlug ? ' act' : '') + '" data-slug="' + s + '">' +
      '<div class="pdot ' + (p.status || 'active') + '"></div>' +
      '<span class="pname">' + p.titel + '</span>' +
      '</div>';
  }).join('');
  
  el.querySelectorAll('.pitem').forEach(function(el) {
    el.addEventListener('click', function() {
      openProject(this.dataset.slug);
    });
  });
}

function openProject(slug) {
  activSlug = slug;
  renderSidebar();
  renderEditor(slug);
}

// ======= NEW PROJECT =======
function showNewProject() {
  activSlug = '';
  renderSidebar();
  document.getElementById('main-content').innerHTML =
    '<div class="mh"><div class="mt">Neues Projekt</div></div>' +
    '<div class="card">' +
      '<div class="ct2">Projektdaten</div>' +
      '<div class="fr2">' +
        '<div class="fg"><label class="fl">Projekttitel *</label><input class="fi fi2" id="n-titel" placeholder="z.B. Epoxidharz Lagerhalle Bern"/></div>' +
        '<div class="fg"><label class="fl">URL-Slug *</label><input class="fi fi2" id="n-slug" placeholder="z.B. mueller-ag-2026"/></div>' +
      '</div>' +
      '<div class="fr2" style="margin-top:1rem">' +
        '<div class="fg"><label class="fl">Auftraggeber</label><input class="fi fi2" id="n-kunde" placeholder="Firma oder Name"/></div>' +
        '<div class="fg"><label class="fl">Objekt / Adresse</label><input class="fi fi2" id="n-objekt" placeholder="Adresse"/></div>' +
      '</div>' +
      '<div class="fr3" style="margin-top:1rem">' +
        '<div class="fg"><label class="fl">Startdatum</label><input class="fi fi2" type="date" id="n-datum"/></div>' +
        '<div class="fg"><label class="fl">Flaeche</label><input class="fi fi2" id="n-flaeche" placeholder="z.B. 450 m2"/></div>' +
        '<div class="fg"><label class="fl">System</label><input class="fi fi2" id="n-system" placeholder="z.B. Epoxidharz EP"/></div>' +
      '</div>' +
      '<div class="fr2" style="margin-top:1rem">' +
        '<div class="fg"><label class="fl">Kunden-Passwort *</label><input class="fi fi2" id="n-pw" placeholder="z.B. mueller2026"/></div>' +
        '<div class="fg"><label class="fl">Status</label>' +
          '<select class="fi fi2" id="n-status">' +
            '<option value="active">In Ausfuehrung</option>' +
            '<option value="done">Abgeschlossen</option>' +
            '<option value="paused">Pausiert</option>' +
          '</select>' +
        '</div>' +
      '</div>' +
      '<div style="display:flex;justify-content:flex-end;margin-top:1.5rem">' +
        '<button class="btn bb" id="btn-create">Projekt erstellen &rarr;</button>' +
      '</div>' +
    '</div>';
  
  document.getElementById('btn-create').addEventListener('click', createProject);
}

function createProject() {
  var titel = document.getElementById('n-titel').value.trim();
  var slug = document.getElementById('n-slug').value.trim().toLowerCase().replace(/\s+/g, '-');
  var pw = document.getElementById('n-pw').value.trim();
  
  if (!titel || !slug || !pw) {
    showToast('Bitte alle Pflichtfelder ausfullen!', 'err');
    return;
  }
  
  allProjects[slug] = {
    titel: titel,
    slug: slug,
    kunde: document.getElementById('n-kunde').value,
    objekt: document.getElementById('n-objekt').value,
    startdatum: document.getElementById('n-datum').value,
    flaeche: document.getElementById('n-flaeche').value,
    system: document.getElementById('n-system').value,
    passwort: pw,
    status: document.getElementById('n-status').value,
    updated: new Date().toISOString(),
    etappen: []
  };
  
  saveProjects(function() {
    showToast('Projekt erstellt!', 'ok');
    activSlug = slug;
    renderSidebar();
    renderEditor(slug);
  });
}

// ======= EDITOR =======
function renderEditor(slug) {
  var p = allProjects[slug];
  var url = 'https://www.polycore.ch/bericht/' + slug;
  var mc = document.getElementById('main-content');
  
  mc.innerHTML =
    '<div class="mh">' +
      '<div class="mt">' + p.titel + '</div>' +
      '<div style="display:flex;gap:.5rem;flex-wrap:wrap">' +
        '<button class="btn bo" id="btn-pub">&#128279; Veroeffentlichen &amp; Link</button>' +
        '<button class="btn bb" id="btn-save">Speichern</button>' +
      '</div>' +
    '</div>' +
    '<div class="lbx">' +
      '<span class="lurl">' + url + '</span>' +
      '<span style="font-size:.72rem;color:var(--muted)">PW: <strong>' + p.passwort + '</strong></span>' +
      '<button class="btn bo" style="padding:.35rem .75rem;font-size:.72rem" id="btn-copy">Kopieren</button>' +
    '</div>' +
    '<div class="card">' +
      '<div class="ct2">Projektdaten</div>' +
      '<div class="fr2">' +
        '<div class="fg"><label class="fl">Auftraggeber</label><input class="fi fi2" id="e-kunde" value="' + (p.kunde||'') + '"/></div>' +
        '<div class="fg"><label class="fl">Objekt</label><input class="fi fi2" id="e-objekt" value="' + (p.objekt||'') + '"/></div>' +
      '</div>' +
      '<div class="fr3" style="margin-top:1rem">' +
        '<div class="fg"><label class="fl">Startdatum</label><input class="fi fi2" type="date" id="e-datum" value="' + (p.startdatum||'') + '"/></div>' +
        '<div class="fg"><label class="fl">Flaeche</label><input class="fi fi2" id="e-flaeche" value="' + (p.flaeche||'') + '"/></div>' +
        '<div class="fg"><label class="fl">System</label><input class="fi fi2" id="e-system" value="' + (p.system||'') + '"/></div>' +
      '</div>' +
      '<div class="fr2" style="margin-top:1rem">' +
        '<div class="fg"><label class="fl">Kunden-Passwort</label><input class="fi fi2" id="e-pw" value="' + (p.passwort||'') + '"/></div>' +
        '<div class="fg"><label class="fl">Status</label>' +
          '<select class="fi fi2" id="e-status">' +
            '<option value="active"' + (p.status==='active'?' selected':'') + '>In Ausfuehrung</option>' +
            '<option value="done"' + (p.status==='done'?' selected':'') + '>Abgeschlossen</option>' +
            '<option value="paused"' + (p.status==='paused'?' selected':'') + '>Pausiert</option>' +
          '</select>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="card">' +
      '<div class="ct2">' +
        '<span>Etappen (' + p.etappen.length + ')</span>' +
        '<button class="btn bd" style="padding:.4rem .9rem;font-size:.75rem" id="btn-add-et">+ Etappe</button>' +
      '</div>' +
      '<div id="et-list">' +
        p.etappen.map(function(e, i) { return renderEtappe(e, i, slug); }).join('') +
        (!p.etappen.length ? '<p style="text-align:center;color:var(--muted);padding:1.5rem;font-size:.83rem">Noch keine Etappen.</p>' : '') +
      '</div>' +
    '</div>' +
    '<div style="display:flex;justify-content:flex-end;margin-top:.5rem">' +
      '<button class="btn bdel" id="btn-del-proj">Projekt loschen</button>' +
    '</div>';
  
  document.getElementById('btn-save').addEventListener('click', function() { saveProject(slug); });
  document.getElementById('btn-pub').addEventListener('click', function() { publishProject(slug); });
  document.getElementById('btn-copy').addEventListener('click', function() {
    navigator.clipboard.writeText(url).then(function() { showToast('Link kopiert!', 'ok'); });
  });
  document.getElementById('btn-add-et').addEventListener('click', function() { addEtappe(slug); });
  document.getElementById('btn-del-proj').addEventListener('click', function() { deleteProject(slug); });
}

function readEditorFields(slug) {
  var p = allProjects[slug];
  p.kunde = document.getElementById('e-kunde').value;
  p.objekt = document.getElementById('e-objekt').value;
  p.startdatum = document.getElementById('e-datum').value;
  p.flaeche = document.getElementById('e-flaeche').value;
  p.system = document.getElementById('e-system').value;
  p.passwort = document.getElementById('e-pw').value;
  p.status = document.getElementById('e-status').value;
  p.updated = new Date().toISOString();
}

function saveProject(slug) {
  readEditorFields(slug);
  saveProjects(function() {
    showToast('Gespeichert!', 'ok');
    renderSidebar();
  });
}

function publishProject(slug) {
  readEditorFields(slug);
  var p = allProjects[slug];
  
  saveProjects(function() {
    ghFetch('bericht/template.html')
      .then(function(tf) {
        var html = decodeB64(tf.content);
        var dataTag = '<scr' + 'ipt>window.PROJEKT_DATA=' + JSON.stringify(p) + ';<' + '/scr' + 'ipt>';
        html = html.replace('</head>', dataTag + '</head>');
        return ghFetch('bericht/' + slug + '.html')
          .then(function(f) { return f.sha; })
          .catch(function() { return null; })
          .then(function(sha) {
            return ghPut('bericht/' + slug + '.html', html, 'Bericht: ' + p.titel, sha);
          });
      })
      .then(function() {
        var url = 'https://www.polycore.ch/bericht/' + slug;
        return navigator.clipboard.writeText(url).then(function() {
          showToast('Veroeffentlicht! Link kopiert', 'ok');
        });
      })
      .catch(function(e) {
        showToast('Fehler: ' + e.message, 'err');
      });
  });
}

function deleteProject(slug) {
  if (!confirm('Projekt wirklich loschen?')) return;
  
  ghFetch('bericht/' + slug + '.html')
    .then(function(f) {
      return fetch('https://api.github.com/repos/' + REPO + '/contents/bericht/' + slug + '.html', {
        method: 'DELETE',
        headers: {'Authorization': 'token ' + ghTok, 'Content-Type': 'application/json'},
        body: JSON.stringify({message: 'Geloscht', sha: f.sha, branch: BRANCH})
      });
    })
    .catch(function() {})
    .then(function() {
      delete allProjects[slug];
      return saveProjects(function() {
        activSlug = '';
        renderSidebar();
        document.getElementById('main-content').innerHTML = '<div class="empty"><h3>Projekt geloscht</h3></div>';
        showToast('Geloscht', 'ok');
      });
    });
}

// ======= ETAPPEN =======
function renderEtappe(e, i, slug) {
  var st = e.status || 'pending';
  var stNames = {pending: 'Ausstehend', active: 'Aktiv', completed: 'Fertig'};
  var stOpts = ['pending','active','completed'].map(function(s) {
    var label = {pending:'Ausstehend',active:'In Bearbeitung',completed:'Abgeschlossen'}[s];
    return '<option value="' + s + '"' + (st === s ? ' selected' : '') + '>' + label + '</option>';
  }).join('');
  
  var fotosHtml = (e.fotos || []).map(function(f, fi) {
    return '<div class="ft"><img src="' + f.url + '" alt=""/>' +
      '<button class="fdel" data-slug="' + slug + '" data-i="' + i + '" data-fi="' + fi + '" data-action="delfoto">x</button></div>';
  }).join('');
  
  var cmtsHtml = (e.kommentare || []).map(function(k, ki) {
    return '<div style="display:flex;gap:.5rem;margin-bottom:.5rem">' +
      '<div style="flex:1;font-size:.8rem;background:#fff;border:1px solid var(--border);border-radius:6px;padding:.5rem .75rem">' +
        '<span style="font-size:.65rem;color:var(--muted);display:block">' + (k.datum||'') + '</span>' + k.text +
      '</div>' +
      '<button class="btn bdel" style="padding:.3rem .5rem;font-size:.7rem" data-slug="' + slug + '" data-i="' + i + '" data-ki="' + ki + '" data-action="delcmt">x</button>' +
    '</div>';
  }).join('');

  return '<div class="ec" id="ec-' + slug + '-' + i + '">' +
    '<div class="eh" data-i="' + i + '" data-action="toggleet">' +
      '<div class="en">' + (i+1) + '</div>' +
      '<div class="etname">' + (e.titel || 'Etappe ' + (i+1)) + '</div>' +
      '<span class="sp ' + st + '">' + stNames[st] + '</span>' +
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>' +
    '</div>' +
    '<div class="eb" id="eb-' + i + '">' +
      '<div class="fr2">' +
        '<div class="fg"><label class="fl">Titel</label><input class="fi fi2" value="' + (e.titel||'') + '" data-slug="' + slug + '" data-i="' + i + '" data-key="titel" data-action="upet"/></div>' +
        '<div class="fg"><label class="fl">Datum</label><input class="fi fi2" type="date" value="' + (e.datum||'') + '" data-slug="' + slug + '" data-i="' + i + '" data-key="datum" data-action="upet"/></div>' +
      '</div>' +
      '<div class="fr3" style="margin-top:1rem">' +
        '<div class="fg"><label class="fl">Stunden</label><input class="fi fi2" type="number" value="' + (e.stunden||'') + '" data-slug="' + slug + '" data-i="' + i + '" data-key="stunden" data-action="upet-num"/></div>' +
        '<div class="fg"><label class="fl">Team</label><input class="fi fi2" value="' + (e.mitarbeiter||'') + '" data-slug="' + slug + '" data-i="' + i + '" data-key="mitarbeiter" data-action="upet"/></div>' +
        '<div class="fg"><label class="fl">Status</label><select class="fi fi2" data-slug="' + slug + '" data-i="' + i + '" data-key="status" data-action="upet">' + stOpts + '</select></div>' +
      '</div>' +
      '<div class="fg" style="margin-top:1rem"><label class="fl">Material</label><input class="fi fi2" value="' + (e.material||'') + '" data-slug="' + slug + '" data-i="' + i + '" data-key="material" data-action="upet" placeholder="z.B. Sikafloor 151"/></div>' +
      '<div class="fg" style="margin-top:1rem"><label class="fl">Beschreibung</label><textarea class="fi fi2" data-slug="' + slug + '" data-i="' + i + '" data-key="beschreibung" data-action="upet">' + (e.beschreibung||'') + '</textarea></div>' +
      '<div class="fg" style="margin-top:1rem"><label class="fl">3D-Scan / Polycam URL</label><input class="fi fi2" value="' + (e.obj_url||'') + '" data-slug="' + slug + '" data-i="' + i + '" data-key="obj_url" data-action="upet" placeholder="https://..."/></div>' +
      '<div class="fg" style="margin-top:1rem"><label class="fl">Fotos</label>' +
        '<div class="fgrid">' + fotosHtml +
          '<div class="fadd" data-slug="' + slug + '" data-i="' + i + '" data-action="addfoto">' +
            '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="21 15 16 10 5 21"/></svg>' +
            '<span>+ Foto URL</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="fg" style="margin-top:.5rem"><label class="fl">Kommentare</label>' +
        cmtsHtml +
        '<div style="display:flex;gap:.5rem">' +
          '<input class="fi fi2" style="flex:1" id="nk-' + i + '" placeholder="Kommentar..."/>' +
          '<button class="btn bd" style="padding:.55rem 1rem" data-slug="' + slug + '" data-i="' + i + '" data-action="addcmt">+</button>' +
        '</div>' +
      '</div>' +
      '<div style="display:flex;justify-content:flex-end;margin-top:.75rem">' +
        '<button class="btn bdel" style="padding:.4rem .9rem;font-size:.75rem" data-slug="' + slug + '" data-i="' + i + '" data-action="delet">Etappe loschen</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function toggleEt(i) {
  var el = document.getElementById('eb-' + i);
  if (el) el.classList.toggle('open');
}

function updateEt(slug, i, key, val) {
  allProjects[slug].etappen[i][key] = val;
}

// Event delegation za etappen akcije
document.addEventListener('click', function(e) {
  var target = e.target.closest('[data-action]');
  if (!target) return;
  var action = target.dataset.action;
  var slug = target.dataset.slug;
  var i = parseInt(target.dataset.i);
  var fi = parseInt(target.dataset.fi);
  var ki = parseInt(target.dataset.ki);
  
  if (action === 'toggleet') { toggleEt(parseInt(target.dataset.i)); }
  else if (action === 'delfoto') { delFoto(slug, i, fi); }
  else if (action === 'delcmt') { delKommentar(slug, i, ki); }
  else if (action === 'addfoto') { addFoto(slug, i); }
  else if (action === 'addcmt') { addKommentar(slug, i); }
  else if (action === 'delet') { deleteEtappe(slug, i); }
});

document.addEventListener('change', function(e) {
  var target = e.target.closest('[data-action]');
  if (!target) return;
  var action = target.dataset.action;
  var slug = target.dataset.slug;
  var i = parseInt(target.dataset.i);
  var key = target.dataset.key;
  if (action === 'upet') { updateEt(slug, i, key, target.value); }
  else if (action === 'upet-num') { updateEt(slug, i, key, +target.value); }
});

function addEtappe(slug) {
  allProjects[slug].etappen.push({
    titel: 'Neue Etappe',
    datum: new Date().toISOString().slice(0,10),
    status: 'pending',
    fotos: [],
    kommentare: []
  });
  renderEditor(slug);
}

function deleteEtappe(slug, i) {
  if (!confirm('Etappe loschen?')) return;
  allProjects[slug].etappen.splice(i, 1);
  renderEditor(slug);
}

function addFoto(slug, i) {
  var url = prompt('Foto URL eingeben:');
  if (!url) return;
  var cap = prompt('Bildunterschrift (optional):') || '';
  if (!allProjects[slug].etappen[i].fotos) allProjects[slug].etappen[i].fotos = [];
  allProjects[slug].etappen[i].fotos.push({url: url, caption: cap});
  renderEditor(slug);
}

function delFoto(slug, i, fi) {
  allProjects[slug].etappen[i].fotos.splice(fi, 1);
  renderEditor(slug);
}

function addKommentar(slug, i) {
  var txt = document.getElementById('nk-' + i).value.trim();
  if (!txt) return;
  if (!allProjects[slug].etappen[i].kommentare) allProjects[slug].etappen[i].kommentare = [];
  allProjects[slug].etappen[i].kommentare.push({
    datum: new Date().toLocaleDateString('de-CH'),
    text: txt
  });
  renderEditor(slug);
}

function delKommentar(slug, i, ki) {
  allProjects[slug].etappen[i].kommentare.splice(ki, 1);
  renderEditor(slug);
}
</script>
