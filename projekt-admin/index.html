<!DOCTYPE html>
<html lang="de-CH">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Projekt Admin | POLYCORE GmbH</title>
<link rel="icon" href="/assets/img/favicon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bx:#4a0e1a;--ink:#0a0a0a;--muted:#666;--border:#e4e4e4;--bg:#f8f7f5}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--ink)}
.lbox{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center}
.lbox img{width:140px;margin-bottom:1.5rem}
.lbox h2{font-size:1.2rem;font-weight:700;margin-bottom:.3rem}
.lbox p{font-size:.82rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.6}
.fi{width:100%;padding:.75rem 1rem;border:1.5px solid var(--border);border-radius:10px;font-size:.88rem;font-family:inherit;outline:none;margin-bottom:.75rem;display:block;transition:border-color .2s}
.fi:focus{border-color:var(--bx)}
.fi0{margin-bottom:0}
select.fi,select.fi0{cursor:pointer}
textarea.fi,textarea.fi0{resize:vertical;min-height:70px}
.btnp{width:100%;padding:.8rem;background:var(--bx);color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s}
.btnp:hover{background:#3a0a14}
.err-msg{color:#c0392b;font-size:.8rem;margin-top:.5rem;display:none}
#app-screen{display:none}
.sb{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--ink);padding:1.5rem;overflow-y:auto;z-index:10}
.sb-logo{width:110px;margin-bottom:2rem;opacity:.9;display:block}
.sb-lbl{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:.5rem;padding-left:.5rem}
.sb-btn{display:flex;align-items:center;gap:.6rem;width:100%;padding:.65rem .75rem;border-radius:8px;border:none;background:none;color:rgba(255,255,255,.6);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;text-align:left;transition:background .15s,color .15s;margin-bottom:.2rem}
.sb-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-div{height:1px;background:rgba(255,255,255,.08);margin:1rem 0}
.pi{display:flex;align-items:center;gap:.6rem;padding:.6rem .75rem;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:.15rem}
.pi:hover{background:rgba(255,255,255,.06)}
.pi.act{background:rgba(74,14,26,.5)}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pdot.active{background:#4caf50}.pdot.done{background:rgba(255,255,255,.25)}.pdot.paused{background:#ff9800}
.pname{font-size:.78rem;color:rgba(255,255,255,.65);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pi.act .pname{color:#fff}
.main{margin-left:260px;padding:2rem;min-height:100vh}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;gap:1rem;flex-wrap:wrap}
.mt{font-size:1.4rem;font-weight:700;letter-spacing:-.03em}
.btn{padding:.6rem 1.2rem;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;font-family:inherit;display:inline-flex;align-items:center;gap:.4rem;transition:background .15s}
.bd{background:var(--ink);color:#fff}.bd:hover{background:var(--bx)}
.bb{background:var(--bx);color:#fff}.bb:hover{background:#3a0a14}
.bo{border:1.5px solid var(--border);background:#fff;color:var(--ink)}.bo:hover{border-color:var(--ink)}
.bdel{background:#fee;color:#c0392b;border:1.5px solid #fcc}
.card{background:#fff;border-radius:14px;padding:1.5rem;border:1px solid var(--border);margin-bottom:1.25rem}
.card-t{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between}
.fg{margin-bottom:1rem}
.fl{display:block;font-size:.73rem;font-weight:700;color:var(--muted);margin-bottom:.35rem}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.lbx{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.lurl{font-size:.76rem;font-family:monospace;color:var(--bx);flex:1;word-break:break-all}
/* Etappen */
.ec{background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:.75rem}
.eh{display:flex;align-items:center;gap:.75rem;cursor:pointer;user-select:none}
.en{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.etname{font-size:.9rem;font-weight:600;flex:1}
.sp{font-size:.62rem;font-weight:700;padding:.2rem .65rem;border-radius:50px;text-transform:uppercase}
.sp.completed{background:#e8f5e9;color:#2e7d32}
.sp.active{background:#fff3e0;color:#e65100}
.sp.pending{background:#f5f5f5;color:#666}
.eb{display:none;margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--border)}
.eb.open{display:block}
/* Foto grid */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:.5rem;margin-top:.5rem}
.ft{position:relative;aspect-ratio:4/3;border-radius:8px;overflow:hidden;background:#f0f0f0}
.ft img{width:100%;height:100%;object-fit:cover}
.fdel{position:absolute;top:.25rem;right:.25rem;background:rgba(0,0,0,.65);color:#fff;border:none;width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:.65rem;display:flex;align-items:center;justify-content:center}
.fadd{aspect-ratio:4/3;border-radius:8px;border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:.3rem;background:#fff;transition:border-color .2s;text-align:center;padding:.5rem}
.fadd:hover{border-color:var(--bx)}
.fadd input[type=file]{display:none}
.fadd span{font-size:.62rem;color:var(--muted);line-height:1.4}
/* Upload progress */
.upload-progress{font-size:.75rem;color:var(--bx);margin-top:.35rem;display:none}
/* Material table */
.mat-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:.5rem;align-items:center;margin-bottom:.4rem}
/* Aufmass table */
.am-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:.5rem;align-items:center;margin-bottom:.4rem}
/* Toast */
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--ink);color:#fff;padding:.75rem 1.25rem;border-radius:10px;font-size:.82rem;font-weight:600;opacity:0;transform:translateY(10px);transition:all .3s;z-index:9999;pointer-events:none;max-width:300px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:#2e7d32}
.toast.err{background:#c0392b}
.empty{text-align:center;padding:4rem 2rem;color:var(--muted)}
.tabs{display:flex;gap:.25rem;border-bottom:2px solid var(--border);margin-bottom:1.5rem}
.tab{padding:.5rem 1rem;font-size:.8rem;font-weight:600;cursor:pointer;border:none;background:none;font-family:inherit;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s}
.tab.active{color:var(--bx);border-bottom-color:var(--bx)}
.tab-pane{display:none}
.tab-pane.active{display:block}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lbox">
    <img src="/assets/img/PolyCoreLogo.png" alt="POLYCORE"/>
    <h2>Projekt Admin</h2>
    <p>Baustellenberichte erstellen und verwalten</p>
    <label class="fl" style="text-align:left">Admin-Passwort</label>
    <input class="fi" type="password" id="f-pw" placeholder="polycore2026"/>
    <label class="fl" style="text-align:left;margin-top:.25rem">GitHub Personal Access Token</label>
    <input class="fi" type="password" id="f-tok" placeholder="ghp_xxxxxxxxxxxx"/>
    <p style="font-size:.7rem;color:var(--muted);text-align:left;margin-bottom:1rem;line-height:1.5">GitHub → Settings → Developer settings → Personal access tokens (classic) → Scope: <strong>repo</strong></p>
    <button class="btnp" id="login-btn">Einloggen</button>
    <div class="err-msg" id="login-err">Falsches Passwort oder Token fehlt.</div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="sb">
    <img src="/assets/img/1PolyCoreLogo.png" class="sb-logo" alt="POLYCORE"/>
    <div class="sb-lbl">Projekte</div>
    <div id="proj-list"></div>
    <div class="sb-div"></div>
    <button class="sb-btn" id="btn-new">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Neues Projekt
    </button>
    <button class="sb-btn" id="btn-logout">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Abmelden
    </button>
  </div>
  <div class="main" id="main-content">
    <div class="empty"><h3 style="font-size:1rem;margin-bottom:.5rem">Kein Projekt ausgewählt</h3><p style="font-size:.83rem">Links ein Projekt wählen oder neues erstellen.</p></div>
  </div>
</div>

<div class="toast" id="toast-el"></div>

<script>
// ===== CONFIG =====
var ADMIN_PW = 'polycore2026';
var REPO = 'mevi977/PolyCoreWeb';
var BRANCH = 'main';
// Slike se uploadaju direktno na GitHub

var ghTok = '';
var projects = {};
var activeSlug = '';

// ===== TOAST =====
function toast(msg, type) {
  var el = document.getElementById('toast-el');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.className = 'toast'; }, 4000);
}

// ===== AUTH =====
document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('f-pw').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
document.getElementById('f-tok').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
document.getElementById('btn-logout').addEventListener('click', function(){ location.reload(); });
document.getElementById('btn-new').addEventListener('click', showNewProject);

function doLogin() {
  var pw = document.getElementById('f-pw').value;
  var tok = document.getElementById('f-tok').value.trim();
  var err = document.getElementById('login-err');
  if (pw !== ADMIN_PW) { err.textContent='Falsches Passwort!'; err.style.display='block'; return; }
  if (!tok) { err.textContent='Bitte GitHub Token eingeben!'; err.style.display='block'; return; }
  err.style.display='none';
  ghTok = tok;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  loadProjects();
}

// ===== GITHUB =====
function ghFetch(path) {
  return fetch('https://api.github.com/repos/'+REPO+'/contents/'+path, {
    headers: {'Authorization':'token '+ghTok,'Accept':'application/vnd.github.v3+json'}
  }).then(function(r){ if(!r.ok) return r.text().then(function(t){throw new Error(t);}); return r.json(); });
}
function ghPut(path, content, msg, sha) {
  var body = {message:msg, content:btoa(unescape(encodeURIComponent(content))), branch:BRANCH};
  if (sha) body.sha = sha;
  return fetch('https://api.github.com/repos/'+REPO+'/contents/'+path, {
    method:'PUT', headers:{'Authorization':'token '+ghTok,'Content-Type':'application/json'},
    body: JSON.stringify(body)
  }).then(function(r){ if(!r.ok) return r.text().then(function(t){throw new Error(t);}); return r.json(); });
}
function decode(c){ return new TextDecoder().decode(Uint8Array.from(atob(c.replace(/\n/g,'')),function(x){return x.charCodeAt(0);})); }

// ===== PROJECTS =====
function loadProjects() {
  ghFetch('bericht/projekte.json')
    .then(function(f){ projects=JSON.parse(decode(f.content)); renderSidebar(); })
    .catch(function(){ projects={}; renderSidebar(); });
}

function saveProjects(cb) {
  function attempt(tries) {
    ghFetch('bericht/projekte.json')
      .then(function(f){ return f.sha; })
      .catch(function(){ return null; })
      .then(function(sha){
        return ghPut('bericht/projekte.json', JSON.stringify(projects,null,2), 'Projekte aktualisiert', sha);
      })
      .then(function(){ toast('Gespeichert!','ok'); if(cb) cb(); })
      .catch(function(e){
        if(tries>0 && e.message && (e.message.indexOf('409')!==-1||e.message.indexOf('422')!==-1)) {
          setTimeout(function(){ attempt(tries-1); }, 1000);
        } else {
          toast('Fehler: '+e.message.slice(0,80),'err');
        }
      });
  }
  attempt(3);
}

var _tpl = null;
var _berichtShas = {}; // SHA cache za bericht fajlove

function publishBericht(slug, cb) {
  readFields(slug);
  var p = projects[slug];
  toast('Wird gespeichert...', '');

  // 1. Spremi projekte.json
  saveProjects(function() {
    // 2. Generiraj bericht HTML
    function buildAndPush(tplHtml) {
      var tag = '<'+'script'+'>window.PROJEKT_DATA='+JSON.stringify(p)+';</'+'script'+'>';
      var html = tplHtml.replace('</head>', tag + '</head>');
      var sha = _berichtShas[slug] || null;
      ghPut('bericht/'+slug+'.html', html, 'Bericht: '+p.titel, sha)
        .then(function(res) {
          _berichtShas[slug] = res.content.sha;
          var url = 'https://www.polycore.ch/bericht/'+slug;
          navigator.clipboard.writeText(url).catch(function(){});
          toast('Veröffentlicht! Link kopiert ✓', 'ok');
          if(cb) cb();
        })
        .catch(function(e) {
          // SHA conflict - fetch novi SHA i retry
          if(e.message && e.message.indexOf('409') !== -1) {
            ghFetch('bericht/'+slug+'.html')
              .then(function(f){ _berichtShas[slug]=f.sha; return ghPut('bericht/'+slug+'.html',html,'Bericht: '+p.titel,f.sha); })
              .then(function(res){ _berichtShas[slug]=res.content.sha; toast('Veröffentlicht! ✓','ok'); })
              .catch(function(e2){ toast('Fehler: '+e2.message.slice(0,60),'err'); });
          } else {
            toast('Publish-Fehler: '+e.message.slice(0,60),'err');
          }
        });
    }

    if(_tpl) {
      buildAndPush(_tpl);
    } else {
      ghFetch('bericht/template.html')
        .then(function(tf){ _tpl=decode(tf.content); buildAndPush(_tpl); })
        .catch(function(e){ toast('Template Fehler: '+e.message.slice(0,50),'err'); });
    }
  });
}

// ===== SIDEBAR =====
function renderSidebar() {
  var el = document.getElementById('proj-list');
  var slugs = Object.keys(projects).sort(function(a,b){
    return (projects[b].updated||'').localeCompare(projects[a].updated||'');
  });
  if (!slugs.length) {
    el.innerHTML = '<div style="font-size:.75rem;color:rgba(255,255,255,.3);padding:.5rem">Noch keine Projekte</div>';
    return;
  }
  el.innerHTML = slugs.map(function(s){
    var p=projects[s];
    return '<div class="pi'+(s===activeSlug?' act':'')+'" data-slug="'+s+'">'+
      '<div class="pdot '+(p.status||'active')+'"></div>'+
      '<span class="pname">'+p.titel+'</span></div>';
  }).join('');
  el.querySelectorAll('.pi').forEach(function(el){
    el.addEventListener('click', function(){ openProject(this.dataset.slug); });
  });
}

function openProject(slug) {
  activeSlug = slug;
  renderSidebar();
  renderEditor(slug);
}

// ===== NEW PROJECT =====
function showNewProject() {
  activeSlug=''; renderSidebar();
  document.getElementById('main-content').innerHTML =
    '<div class="mh"><div class="mt">Neues Projekt</div></div>'+
    '<div class="card"><div class="card-t">Projektdaten</div>'+
      '<div class="fr2"><div class="fg"><label class="fl">Projekttitel *</label><input class="fi fi0" id="n-titel" placeholder="z.B. Epoxidharz Lagerhalle Bern"/></div>'+
      '<div class="fg"><label class="fl">URL-Slug *</label><input class="fi fi0" id="n-slug" placeholder="z.B. mueller-ag-2026"/></div></div>'+
      '<div class="fr2" style="margin-top:1rem"><div class="fg"><label class="fl">Auftraggeber</label><input class="fi fi0" id="n-kunde" placeholder="Firma"/></div>'+
      '<div class="fg"><label class="fl">Objekt / Adresse</label><input class="fi fi0" id="n-objekt" placeholder="Adresse"/></div></div>'+
      '<div class="fr3" style="margin-top:1rem">'+
        '<div class="fg"><label class="fl">Startdatum</label><input class="fi fi0" type="date" id="n-datum"/></div>'+
        '<div class="fg"><label class="fl">Fläche</label><input class="fi fi0" id="n-flaeche" placeholder="z.B. 450 m²"/></div>'+
        '<div class="fg"><label class="fl">System</label><input class="fi fi0" id="n-system" placeholder="z.B. Epoxidharz EP"/></div>'+
      '</div>'+
      '<div class="fr2" style="margin-top:1rem">'+
        '<div class="fg"><label class="fl">Kunden-Passwort *</label><input class="fi fi0" id="n-pw" placeholder="z.B. mueller2026"/></div>'+
        '<div class="fg"><label class="fl">Status</label><select class="fi fi0" id="n-status"><option value="active">In Ausführung</option><option value="done">Abgeschlossen</option><option value="paused">Pausiert</option></select></div>'+
      '</div>'+
      '<div style="display:flex;justify-content:flex-end;margin-top:1.5rem"><button class="btn bb" id="btn-create">Projekt erstellen →</button></div>'+
    '</div>';
  document.getElementById('btn-create').addEventListener('click', createProject);
}

function createProject() {
  var titel=document.getElementById('n-titel').value.trim();
  var slug=document.getElementById('n-slug').value.trim().toLowerCase().replace(/\s+/g,'-');
  var pw=document.getElementById('n-pw').value.trim();
  if(!titel||!slug||!pw){toast('Bitte Pflichtfelder ausfüllen!','err');return;}
  projects[slug]={titel:titel,slug:slug,
    kunde:document.getElementById('n-kunde').value,
    objekt:document.getElementById('n-objekt').value,
    startdatum:document.getElementById('n-datum').value,
    flaeche:document.getElementById('n-flaeche').value,
    system:document.getElementById('n-system').value,
    passwort:pw,status:document.getElementById('n-status').value,
    updated:new Date().toISOString(),
    etappen:[],materialien:[],aufmass:[]
  };
  saveProjects(function(){ activeSlug=slug; renderSidebar(); renderEditor(slug); });
}

// ===== EDITOR =====
function readFields(slug) {
  var p=projects[slug];
  // Osnovna polja
  var kEl=document.getElementById('e-kunde'); if(kEl) p.kunde=kEl.value;
  var oEl=document.getElementById('e-objekt'); if(oEl) p.objekt=oEl.value;
  var dEl=document.getElementById('e-datum'); if(dEl) p.startdatum=dEl.value;
  var fEl=document.getElementById('e-flaeche'); if(fEl) p.flaeche=fEl.value;
  var sEl=document.getElementById('e-system'); if(sEl) p.system=sEl.value;
  var pEl=document.getElementById('e-pw'); if(pEl) p.passwort=pEl.value;
  var stEl=document.getElementById('e-status'); if(stEl) p.status=stEl.value;
  p.updated=new Date().toISOString();

  // Cisti citanje Extras direktno iz DOM-a (siguran fallback)
  // Material
  var matInputs=document.querySelectorAll('[data-mat][data-slug="'+slug+'"]');
  matInputs.forEach(function(el){
    var mi=parseInt(el.dataset.mi),k=el.dataset.key;
    if(!p.materialien) p.materialien=[];
    if(!p.materialien[mi]) p.materialien[mi]={name:'',menge:'',einheit:''};
    p.materialien[mi][k]=el.value;
  });
  // Aufmass
  var amInputs=document.querySelectorAll('[data-am][data-slug="'+slug+'"]');
  amInputs.forEach(function(el){
    var ai=parseInt(el.dataset.ai),k=el.dataset.key;
    if(!p.aufmass) p.aufmass=[];
    if(!p.aufmass[ai]) p.aufmass[ai]={bezeichnung:'',wert:'',einheit:''};
    p.aufmass[ai][k]=el.value;
  });
  // Regie
  var regieInputs=document.querySelectorAll('[data-regie][data-slug="'+slug+'"]');
  regieInputs.forEach(function(el){
    var ri=parseInt(el.dataset.ri),k=el.dataset.key;
    if(!p.regie_tage) p.regie_tage=[];
    if(!p.regie_tage[ri]) p.regie_tage[ri]={datum:'',beschreibung:'',stunden:'',mitarbeiter:''};
    p.regie_tage[ri][k]=el.value;
  });
}

function renderEditor(slug) {
  var p=projects[slug];
  var url='https://www.polycore.ch/bericht/'+slug;
  var mc=document.getElementById('main-content');

  mc.innerHTML=
    '<div class="mh">'+
      '<div class="mt">'+p.titel+'</div>'+
      '<div style="display:flex;gap:.5rem;flex-wrap:wrap">'+
        '<button class="btn bo" id="btn-pub">↗ Veröffentlichen &amp; Link</button>'+
        '<button class="btn bb" id="btn-save">Speichern</button>'+
      '</div>'+
    '</div>'+
    '<div class="lbx">'+
      '<span class="lurl">'+url+'</span>'+
      '<span style="font-size:.72rem;color:var(--muted)">PW: <strong>'+p.passwort+'</strong></span>'+
      '<button class="btn bo" style="padding:.35rem .75rem;font-size:.72rem" id="btn-copy">Link kopieren</button>'+
    '</div>'+
    // Tabs
    '<div class="tabs">'+

function toggleEt(i){

function addEtappe(slug){
  projects[slug].etappen.push({titel:'Neue Etappe',datum:new Date().toISOString().slice(0,10),status:'pending',fotos:[],kommentare:[]});
  refreshEtList(slug);
  document.querySelector('.tab[data-tab="etappen"]').textContent='Etappen ('+projects[slug].etappen.length+')';

function addComment(slug,i){
  var el=document.getElementById('nk-'+i);
  if(!el||!el.value.trim()) return;
  if(!projects[slug].etappen[i].kommentare) projects[slug].etappen[i].kommentare=[];
  projects[slug].etappen[i].kommentare.push({datum:new Date().toLocaleDateString('de-CH'),text:el.value.trim()});
  refreshEtList(slug);
}

// ===== FOTO UPLOAD via imgbb.com (gratis, kein Account nötig) =====
// imgbb.com - besplatni foto hosting
// Key ce biti pitati pri prvom uploadu ako nije unesan
var IMGBB_KEY = localStorage.getItem('imgbb_key') || '';

function uploadPhotos(files, slug, i) {
  if(!files||!files.length) return;
  // Provjeri imgbb key
  if(!IMGBB_KEY) {
    IMGBB_KEY = prompt('Bitte imgbb.com API Key eingeben:\n\n1. Gehe zu imgbb.com\n2. Kostenlos registrieren\n3. API Key kopieren');
    if(!IMGBB_KEY) return;
    localStorage.setItem('imgbb_key', IMGBB_KEY);
  }
  var prog=document.getElementById('up-'+i);
  if(prog){prog.style.display='block';prog.textContent='Wird hochgeladen...';}
  var arr=Array.from(files);
  var done=0, failed=0;

  arr.forEach(function(file){
    var reader=new FileReader();
    reader.onload=function(ev){
      var base64=ev.target.result.split(',')[1];
      var fd=new FormData();
      fd.append('key', IMGBB_KEY);
      fd.append('image', base64);
      fd.append('name', slug+'-'+Date.now());

      fetch('https://api.imgbb.com/1/upload',{method:'POST',body:fd})
        .then(function(r){return r.json();})
        .then(function(d){
          if(d.success){
            if(!projects[slug].etappen[i].fotos) projects[slug].etappen[i].fotos=[];
            projects[slug].etappen[i].fotos.push({url:d.data.url,caption:''});
            done++;
          } else {
            failed++;
            toast('Upload fehlgeschlagen','err');
          }
          if(done+failed===arr.length){
            if(prog) prog.style.display='none';
            refreshEtList(slug);
            if(done>0) toast(done+' Foto(s) hochgeladen ✓','ok');
          }
        })
        .catch(function(){
          // Fallback: pitaj za URL direktno
          failed++;
          if(done+failed===arr.length){
            if(prog) prog.style.display='none';
            var url=prompt('Upload fehlgeschlagen. Bitte Foto-URL manuell eingeben:');
            if(url){
              if(!projects[slug].etappen[i].fotos) projects[slug].etappen[i].fotos=[];
              projects[slug].etappen[i].fotos.push({url:url,caption:''});
              refreshEtList(slug);
            }
          }
        });
    };
    reader.readAsDataURL(file);
  });
}

  var html=

// Extras event delegation - setup after render
document.addEventListener('click', function(e){
  var t=e.target.closest('[data-action]');

  var a=t.dataset.action,s=t.dataset.slug;
  var mi=parseInt(t.dataset.mi),ai=parseInt(t.dataset.ai),ri=parseInt(t.dataset.ri);

  if(a==='addmat'){
    if(!projects[s].materialien) projects[s].materialien=[];
    projects[s].materialien.push({name:'',menge:'',einheit:'kg'});
    document.getElementById('tab-extras').innerHTML=renderExtras(s);
  } else if(a==='delmat'){
    projects[s].materialien.splice(mi,1);
    document.getElementById('tab-extras').innerHTML=renderExtras(s);
  } else if(a==='addam'){
    if(!projects[s].aufmass) projects[s].aufmass=[];
    projects[s].aufmass.push({bezeichnung:'',wert:'',einheit:'m²'});
    document.getElementById('tab-extras').innerHTML=renderExtras(s);
  } else if(a==='delam'){
    projects[s].aufmass.splice(ai,1);
    document.getElementById('tab-extras').innerHTML=renderExtras(s);
  } else if(a==='addregie'){
    if(!projects[s].regie_tage) projects[s].regie_tage=[];
    projects[s].regie_tage.push({datum:new Date().toISOString().slice(0,10),beschreibung:'',stunden:'',mitarbeiter:''});
    document.getElementById('tab-extras').innerHTML=renderExtras(s);
  } else if(a==='delregie'){
    projects[s].regie_tage.splice(ri,1);
    document.getElementById('tab-extras').innerHTML=renderExtras(s);
  }
});

// Koristimo i 'input' i 'change' da hvatamo sve promjene
function handleExtrasInput(e){
  var t=e.target;
  if(t.dataset.mat){
    var s=t.dataset.slug,mi=parseInt(t.dataset.mi),k=t.dataset.key;
    if(projects[s]&&projects[s].materialien&&projects[s].materialien[mi]) 
      projects[s].materialien[mi][k]=t.value;
  } else if(t.dataset.am){
    var s=t.dataset.slug,ai=parseInt(t.dataset.ai),k=t.dataset.key;
    if(projects[s]&&projects[s].aufmass&&projects[s].aufmass[ai]) 
      projects[s].aufmass[ai][k]=t.value;
  } else if(t.dataset.regie){
    var s=t.dataset.slug,ri=parseInt(t.dataset.ri),k=t.dataset.key;
    if(!projects[s].regie_tage) projects[s].regie_tage=[];
    if(projects[s].regie_tage[ri]) projects[s].regie_tage[ri][k]=t.value;
  }
}
document.addEventListener('input', handleExtrasInput);
document.addEventListener('change', handleExtrasInput);

// ===== DELETE PROJECT =====
function deleteProject(slug) {
  if(!confirm('Projekt "'+projects[slug].titel+'" wirklich löschen?')) return;
  ghFetch('bericht/'+slug+'.html')
    .then(function(f){
      return fetch('https://api.github.com/repos/'+REPO+'/contents/bericht/'+slug+'.html',{
        method:'DELETE',headers:{'Authorization':'token '+ghTok,'Content-Type':'application/json'},
        body:JSON.stringify({message:'Gelöscht',sha:f.sha,branch:BRANCH})
      });
    }).catch(function(){})
    .then(function(){
      delete projects[slug];
      saveProjects(function(){
        activeSlug=''; renderSidebar();
        document.getElementById('main-content').innerHTML='<div class="empty"><h3>Projekt gelöscht</h3></div>';
      });
    });
}
