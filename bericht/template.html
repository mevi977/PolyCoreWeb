<!DOCTYPE html>
<html lang="de-CH">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Projektbericht | POLYCORE GmbH</title>
<link rel="icon" href="/assets/img/favicon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bx:#4a0e1a;--ink:#0a0a0a;--muted:#666;--border:#e4e4e4;--bg:#f8f7f5}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.lbox{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.15);text-align:center}
.lbox img{width:150px;margin-bottom:1.5rem}
.lbox h2{font-size:1.15rem;font-weight:700;margin-bottom:.3rem}
.lbox p{font-size:.82rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.6}
.fi{width:100%;padding:.8rem 1rem;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;font-family:inherit;outline:none;margin-bottom:.75rem;display:block;transition:border-color .2s}
.fi:focus{border-color:var(--bx)}
.btnp{width:100%;padding:.8rem;background:var(--bx);color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s}
.btnp:hover{background:#3a0a14}
.lerr{color:#c0392b;font-size:.8rem;margin-top:.5rem;display:none}
.spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--bx);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.mw{display:none;max-width:900px;margin:0 auto;padding:2rem 1.5rem 6rem}
.rh{background:var(--ink);border-radius:20px;padding:2.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.rh::before{content:'';position:absolute;top:-40%;right:-5%;width:350px;height:350px;background:radial-gradient(circle,rgba(74,14,26,.7) 0%,transparent 70%);pointer-events:none}
.rh img{width:110px;margin-bottom:1.5rem;opacity:.9;display:block}
.rh-eye{font-size:.62rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:.5rem}
.rh-title{font-size:clamp(1.5rem,5vw,2.75rem);font-weight:700;letter-spacing:-.04em;color:#fff;margin-bottom:.5rem;line-height:1.1}
.rh-client{font-size:.88rem;color:rgba(255,255,255,.45)}
.rh-client strong{color:rgba(255,255,255,.8)}
.rh-meta{display:flex;flex-wrap:wrap;gap:1.5rem;margin-top:1.75rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.08)}
.rh-mi{display:flex;flex-direction:column;gap:.2rem}
.rh-ml{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.rh-mv{font-size:.85rem;font-weight:600;color:rgba(255,255,255,.75)}
.rs{background:#fff;border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;border:1px solid var(--border)}
.sbadge{display:inline-flex;align-items:center;gap:.4rem;padding:.35rem .9rem;border-radius:50px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.sbadge.active{background:#e8f5e9;color:#2e7d32}
.sbadge.done{background:#fdf5f6;color:var(--bx)}
.sbadge.paused{background:#fff3e0;color:#e65100}
.pw{flex:1;min-width:180px}
.plbl{font-size:.68rem;font-weight:600;color:var(--muted);margin-bottom:.4rem;display:flex;justify-content:space-between}
.pbar{height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--bx),#8b1a2e);border-radius:3px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}
.card{background:#fff;border-radius:14px;padding:1.25rem;border:1px solid var(--border)}
.card-lbl{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem}
.card-val{font-size:1.75rem;font-weight:700;letter-spacing:-.04em}
.card-unit{font-size:.78rem;color:var(--muted);margin-top:.1rem}
.extras-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.extra-box{background:#fff;border-radius:14px;padding:1.25rem;border:1px solid var(--border)}
.extra-ttl{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem}
.extra-row{display:flex;justify-content:space-between;padding:.45rem 0;border-bottom:1px solid var(--border);font-size:.83rem}
.extra-row:last-child{border:none}
.extra-key{color:var(--muted)}
.extra-val{font-weight:600}
.tl{position:relative}
.tl::before{content:'';position:absolute;left:18px;top:0;bottom:0;width:2px;background:var(--border)}
.tle{position:relative;padding-left:54px;margin-bottom:2.5rem}
.tld{position:absolute;left:10px;top:4px;width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid var(--border);z-index:1}
.tle.completed .tld{background:var(--bx);border-color:var(--bx)}
.tle.active .tld{border-color:var(--bx);box-shadow:0 0 0 4px rgba(74,14,26,.1)}
.tl-dt{font-size:.66rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem}
.tl-card{background:#fff;border-radius:14px;padding:1.5rem;border:1px solid var(--border)}
.tle.active .tl-card{border-color:rgba(74,14,26,.2);box-shadow:0 4px 16px rgba(74,14,26,.06)}
.tl-phase{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--bx);margin-bottom:.35rem}
.tl-name{font-size:1.05rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.5rem}
.tl-desc{font-size:.86rem;color:var(--muted);line-height:1.7;margin-bottom:1rem}
.tl-meta{display:flex;gap:1rem;flex-wrap:wrap;padding:.9rem 1rem;background:var(--bg);border-radius:10px;margin-bottom:1rem}
.tl-mi{font-size:.78rem;display:flex;gap:.35rem}
.tl-ml{color:var(--muted)}.tl-mv{font-weight:600}
.foto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.6rem;margin-top:.75rem}
.foto-item{border-radius:10px;overflow:hidden;aspect-ratio:4/3;cursor:pointer;background:#f0f0f0;position:relative}
.foto-item img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.foto-item:hover img{transform:scale(1.05)}
.foto-cap{position:absolute;bottom:0;left:0;right:0;padding:.35rem .5rem;background:linear-gradient(transparent,rgba(0,0,0,.7));color:#fff;font-size:.62rem;font-weight:600}
.pcam{margin-top:.75rem;border-radius:12px;overflow:hidden;border:1px solid rgba(0,0,0,.08)}
.pcam-hd{background:#0a0a0a;padding:.6rem 1rem;display:flex;align-items:center;gap:.5rem}
.pcam-lbl{font-size:.63rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.pcam-link{margin-left:auto;font-size:.63rem;color:rgba(255,255,255,.35);text-decoration:none}
.pcam-link:hover{color:#fff}
.pcam-thumb{width:100%;height:260px;object-fit:cover;display:block}
.pcam-btn{display:flex;align-items:center;justify-content:center;gap:.6rem;padding:.9rem;background:#111;color:rgba(255,255,255,.65);font-size:.82rem;font-weight:600;text-decoration:none}
.pcam-btn:hover{background:#1a1a1a;color:#fff}
.kmts{margin-top:1rem;border-top:1px solid var(--border);padding-top:.75rem}
.kmt{display:flex;gap:.6rem;margin-bottom:.6rem}
.kmt-av{width:26px;height:26px;border-radius:50%;background:var(--bx);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;flex-shrink:0}
.kmt-meta{font-size:.63rem;color:var(--muted);margin-bottom:.15rem}
.kmt-text{font-size:.82rem;line-height:1.6;background:var(--bg);padding:.5rem .75rem;border-radius:0 8px 8px 8px}
.lbox-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:9999;align-items:center;justify-content:center}
.lbox-bg.open{display:flex}
.lbox-x{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,.1);border:none;color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center}
.lbox-p,.lbox-n{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:none;color:#fff;width:50px;height:50px;border-radius:50%;cursor:pointer;font-size:1.8rem;display:flex;align-items:center;justify-content:center}
.lbox-p:hover,.lbox-n:hover{background:rgba(255,255,255,.2)}
.lbox-p{left:1rem}.lbox-n{right:1rem}
.lbox-img{max-width:88vw;max-height:82vh;border-radius:8px;object-fit:contain}
.lbox-cap{color:rgba(255,255,255,.6);font-size:.82rem;text-align:center;margin-top:.6rem}
.lbox-cnt{color:rgba(255,255,255,.3);font-size:.7rem;text-align:center;margin-top:.2rem}
.pdf-btn{position:fixed;bottom:2rem;left:2rem;background:var(--ink);color:#fff;border:none;border-radius:50px;padding:.65rem 1.25rem;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:100;display:none;align-items:center;gap:.5rem}
.pdf-btn:hover{background:var(--bx)}
@media(max-width:600px){.cards{grid-template-columns:1fr 1fr}.extras-grid{grid-template-columns:1fr}.tle{padding-left:40px}.tl::before{left:12px}.tld{left:4px}.lbox-p{left:.25rem}.lbox-n{right:.25rem}}
@media print{.pdf-btn,.screen{display:none!important}.mw{display:block!important;padding:0}}
</style>
</head>
<body>

<div class="screen" id="screen-load" style="background:var(--ink)">
  <div class="lbox">
    <div class="spin"></div>
    <p style="color:var(--muted);font-size:.85rem">Wird geladen...</p>
  </div>
</div>

<div class="screen" id="screen-notfound" style="display:none">
  <div class="lbox">
    <img src="/assets/img/PolyCoreLogo.png" alt="POLYCORE"/>
    <h2>Projekt nicht gefunden</h2>
    <p>Der angeforderte Projektbericht existiert nicht oder der Link ist ungültig.</p>
  </div>
</div>

<div class="screen" id="screen-login" style="display:none">
  <div class="lbox">
    <img src="/assets/img/PolyCoreLogo.png" alt="POLYCORE"/>
    <h2>Projektbericht</h2>
    <p>Bitte geben Sie das Passwort ein, das Sie von POLYCORE GmbH erhalten haben.</p>
    <input class="fi" type="password" id="pw" placeholder="Passwort eingeben..."/>
    <button class="btnp" id="pw-btn">Bericht öffnen</button>
    <div class="lerr" id="pw-err">Falsches Passwort. Bitte erneut versuchen.</div>
  </div>
</div>

<div class="mw" id="mw"></div>

<div class="lbox-bg" id="lbg">
  <button class="lbox-x" id="lbx">✕</button>
  <button class="lbox-p" id="lbp">&#8249;</button>
  <div style="display:flex;flex-direction:column;align-items:center">
    <img class="lbox-img" id="lbi" src="" alt=""/>
    <div class="lbox-cap" id="lbc"></div>
    <div class="lbox-cnt" id="lbct"></div>
  </div>
  <button class="lbox-n" id="lbn">&#8250;</button>
</div>

<button class="pdf-btn" id="pdf-btn" onclick="window.print()">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
  PDF
</button>


<script>
var LB = {fotos:[], idx:0};
var P = null;

// Citaj slug iz URL-a: /bericht/mrelag ili ?p=mrelag
var slug = '';
var path = window.location.pathname;
var match = path.match(/\/bericht\/([^\/\?#]+)/);
if(match) slug = match[1];
if(!slug) slug = new URLSearchParams(window.location.search).get('p') || '';

// Lightbox
document.getElementById('lbx').onclick = closeLB;
document.getElementById('lbp').onclick = function(){navLB(-1);};
document.getElementById('lbn').onclick = function(){navLB(1);};
document.getElementById('lbg').onclick = function(e){if(e.target===this)closeLB();};
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')closeLB();
  else if(e.key==='ArrowLeft')navLB(-1);
  else if(e.key==='ArrowRight')navLB(1);
});
function openLB(fotos,idx){LB={fotos:fotos,idx:idx};updateLB();document.getElementById('lbg').classList.add('open');document.body.style.overflow='hidden';}
function closeLB(){document.getElementById('lbg').classList.remove('open');document.body.style.overflow='';}
function navLB(d){LB.idx=(LB.idx+d+LB.fotos.length)%LB.fotos.length;updateLB();}
function updateLB(){
  var f=LB.fotos[LB.idx];
  document.getElementById('lbi').src=f.url;
  document.getElementById('lbc').textContent=f.caption||'';
  document.getElementById('lbct').textContent=(LB.idx+1)+' / '+LB.fotos.length;
  document.getElementById('lbp').style.display=LB.fotos.length>1?'flex':'none';
  document.getElementById('lbn').style.display=LB.fotos.length>1?'flex':'none';
}

// Ucitaj podatke
if(!slug || slug === 'index') {
  show('screen-notfound');
} else {
  // Koristimo JSDelivr koji ima kratki cache (10 min) ali podrzava purge
  // i GitHub API s random parametrom da zaobidemo browser cache
  // init - vidi na kraju skripte
}

function show(id){
  ['screen-load','screen-notfound','screen-login'].forEach(function(s){
    document.getElementById(s).style.display='none';
  });
  var el=document.getElementById(id);
  if(el) el.style.display='flex';
}

function checkPW(){
  if(document.getElementById('pw').value===P.passwort){
    show('screen-load');
    document.getElementById('screen-load').style.display='none';
    document.getElementById('pdf-btn').style.display='flex';
    render();
  } else {
    document.getElementById('pw-err').style.display='block';
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}

function render(){
  var p=P;
  var totalH=p.etappen.reduce(function(s,e){return s+(+e.stunden||0);},0);
  var doneN=p.etappen.filter(function(e){return e.status==='completed';}).length;
  var prog=p.etappen.length?Math.round(doneN/p.etappen.length*100):0;
  var totalF=p.etappen.reduce(function(s,e){return s+((e.fotos||[]).filter(function(f){return f.url;}).length);},0);
  var stMap={active:'In Ausführung',done:'Abgeschlossen',paused:'Pausiert'};

  var matHtml='';
  if(p.materialien&&p.materialien.filter(function(m){return m.name;}).length){
    matHtml='<div class="extra-box"><div class="extra-ttl">Materialien &amp; Mengen</div>'+
      p.materialien.filter(function(m){return m.name;}).map(function(m){
        return '<div class="extra-row"><span class="extra-key">'+m.name+'</span><span class="extra-val">'+m.menge+' '+m.einheit+'</span></div>';
      }).join('')+'</div>';
  }
  var amHtml='';
  if(p.aufmass&&p.aufmass.filter(function(a){return a.bezeichnung;}).length){
    amHtml='<div class="extra-box"><div class="extra-ttl">Aufmaß</div>'+
      p.aufmass.filter(function(a){return a.bezeichnung;}).map(function(a){
        return '<div class="extra-row"><span class="extra-key">'+a.bezeichnung+'</span><span class="extra-val">'+a.wert+' '+a.einheit+'</span></div>';
      }).join('')+'</div>';
  }
  var regieHtml='';
  if(p.regie_tage&&p.regie_tage.filter(function(r){return r.beschreibung||r.stunden;}).length){
    var rt=p.regie_tage.filter(function(r){return r.beschreibung||r.stunden;});
    var regT=rt.reduce(function(s,r){return s+(+r.stunden||0);},0);
    regieHtml='<div class="extra-box" style="grid-column:1/-1"><div class="extra-ttl">Regie-Tagesbericht ('+regT+'h gesamt)</div>'+
      rt.map(function(r){
        return '<div class="extra-row"><span class="extra-key">'+r.datum+(r.beschreibung?' · '+r.beschreibung:'')+(r.mitarbeiter?' · '+r.mitarbeiter:'')+'</span><span class="extra-val">'+(r.stunden||0)+'h</span></div>';
      }).join('')+'</div>';
  }
  var extrasHtml=(matHtml||amHtml||regieHtml)?'<div class="extras-grid">'+matHtml+amHtml+regieHtml+'</div>':'';

  var html=
    '<div class="rh">'+
      '<img src="/assets/img/1PolyCoreLogo.png" alt="POLYCORE"/>'+
      '<div class="rh-eye">Projektbericht · POLYCORE GmbH</div>'+
      '<div class="rh-title">'+(p.titel||'')+'</div>'+
      '<div class="rh-client">Auftraggeber: <strong>'+(p.kunde||'—')+'</strong></div>'+
      '<div class="rh-meta">'+
        mkM('Objekt',p.objekt)+mkM('Startdatum',p.startdatum)+mkM('Fläche',p.flaeche)+mkM('System',p.system)+
      '</div>'+
    '</div>'+
    '<div class="rs">'+
      '<span class="sbadge '+(p.status||'active')+'">'+(stMap[p.status]||'—')+'</span>'+
      '<div class="pw"><div class="plbl"><span>Fortschritt</span><span>'+doneN+'/'+p.etappen.length+' Etappen</span></div>'+
      '<div class="pbar"><div class="pfill" style="width:'+prog+'%"></div></div></div>'+
    '</div>'+
    '<div class="cards">'+
      mkC('Arbeitsstunden',totalH,'Stunden gesamt')+
      mkC('Etappen',p.etappen.length,doneN+' abgeschlossen')+
      mkC('Fotos',totalF,'Dokumentiert')+
    '</div>'+
    extrasHtml+
    '<div class="tl">'+p.etappen.map(renderEt).join('')+'</div>';

  document.getElementById('mw').innerHTML=html;
  document.getElementById('mw').style.display='block';
}

function mkM(l,v){return '<div class="rh-mi"><span class="rh-ml">'+l+'</span><span class="rh-mv">'+(v||'—')+'</span></div>';}
function mkC(l,v,u){return '<div class="card"><div class="card-lbl">'+l+'</div><div class="card-val">'+v+'</div><div class="card-unit">'+u+'</div></div>';}

function renderEt(e,i){
  var fotos=(e.fotos||[]).filter(function(f){return f.url;});
  var stL={pending:'Ausstehend',active:'In Bearbeitung',completed:'Abgeschlossen'};

  var fotosHtml='';
  if(fotos.length){
    var fs=JSON.stringify(fotos);
    fotosHtml='<div class="foto-grid">'+
      fotos.map(function(f,fi){
        return '<div class="foto-item" onclick=\'openLB('+fs+','+fi+')\'>'+
          '<img src="'+f.url+'" alt="" loading="lazy"/>'+
          (f.caption?'<div class="foto-cap">'+f.caption+'</div>':'')+
        '</div>';
      }).join('')+'</div>';
  }

  var pcamHtml='';
  if(e.obj_url&&e.obj_url.indexOf('poly.cam/capture/')!==-1){
    var id=e.obj_url.split('poly.cam/capture/')[1].replace(/[/?#].*/,'');
    var thumb='https://poly.cam/api/capture/'+id+'/artifacts/thumbnail.jpg';
    pcamHtml='<div class="pcam">'+
      '<div class="pcam-hd"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>'+
      '<span class="pcam-lbl">3D-Scan · Polycam</span>'+
      '<a href="'+e.obj_url+'" target="_blank" class="pcam-link">Vollbild ↗</a></div>'+
      '<img class="pcam-thumb" src="'+thumb+'" alt="3D Scan" loading="lazy"/>'+
      '<a href="'+e.obj_url+'" target="_blank" class="pcam-btn">'+
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>'+
        'Interaktives 3D-Modell öffnen</a></div>';
  }

  var kmtHtml='';
  if(e.kommentare&&e.kommentare.length){
    kmtHtml='<div class="kmts">'+e.kommentare.map(function(k){
      return '<div class="kmt"><div class="kmt-av">PC</div>'+
        '<div><div class="kmt-meta">'+(k.datum||'')+'</div><div class="kmt-text">'+k.text+'</div></div></div>';
    }).join('')+'</div>';
  }

  return '<div class="tle '+(e.status||'')+'">'+
    '<div class="tld"></div>'+
    '<div class="tl-dt">'+(e.datum||'')+'</div>'+
    '<div class="tl-card">'+
      '<div class="tl-phase">Etappe '+(i+1)+' · '+(stL[e.status]||'')+'</div>'+
      '<div class="tl-name">'+(e.titel||'')+'</div>'+
      (e.beschreibung?'<div class="tl-desc">'+e.beschreibung+'</div>':'')+
      '<div class="tl-meta">'+
        (e.stunden?'<div class="tl-mi"><span class="tl-ml">Stunden:</span><span class="tl-mv">'+e.stunden+'h</span></div>':'')+
        (e.mitarbeiter?'<div class="tl-mi"><span class="tl-ml">Team:</span><span class="tl-mv">'+e.mitarbeiter+'</span></div>':'')+
        (e.material?'<div class="tl-mi"><span class="tl-ml">Material:</span><span class="tl-mv">'+e.material+'</span></div>':'')+
      '</div>'+
      fotosHtml+pcamHtml+kmtHtml+
    '</div></div>';
}
