<!DOCTYPE html>
<html lang="de-CH">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Projektbericht | POLYCORE GmbH</title>
<link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bx:#4a0e1a;--bxl:#fdf5f6;--ink:#0a0a0a;--muted:#666;--border:#e4e4e4;--bg:#f8f7f5}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
/* Login */
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--ink)}
.lb{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.lb img{width:150px;margin-bottom:1.75rem}
.lb h2{font-size:1.15rem;font-weight:700;margin-bottom:.3rem}
.lb p{font-size:.82rem;color:var(--muted);margin-bottom:1.75rem;line-height:1.6}
.fi{width:100%;padding:.8rem 1rem;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;font-family:inherit;outline:none;transition:border-color .2s;margin-bottom:.75rem;display:block}
.fi:focus{border-color:var(--bx)}
.btnp{width:100%;padding:.8rem;background:var(--bx);color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s}
.btnp:hover{background:#3a0a14}
.lerr{color:#c0392b;font-size:.8rem;margin-top:.5rem;display:none}
/* Main */
.mw{display:none;max-width:900px;margin:0 auto;padding:2rem 1.5rem 6rem}
/* Header */
.rh{background:var(--ink);border-radius:20px;padding:2.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.rh::before{content:'';position:absolute;top:-40%;right:-5%;width:350px;height:350px;background:radial-gradient(circle,rgba(74,14,26,.7) 0%,transparent 70%);pointer-events:none}
.rh img{width:110px;margin-bottom:1.5rem;opacity:.9;display:block}
.rh-eye{font-size:.62rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:.5rem}
.rh-title{font-size:clamp(1.5rem,5vw,2.75rem);font-weight:700;letter-spacing:-.04em;color:#fff;margin-bottom:.5rem;line-height:1.1}
.rh-client{font-size:.88rem;color:rgba(255,255,255,.45)}
.rh-client strong{color:rgba(255,255,255,.8)}
.rh-meta{display:flex;flex-wrap:wrap;gap:1.5rem;margin-top:1.75rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.08)}
.rh-mi{display:flex;flex-direction:column;gap:.2rem}
.rh-ml{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.rh-mv{font-size:.85rem;font-weight:600;color:rgba(255,255,255,.75)}
/* Status */
.rs{background:#fff;border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;border:1px solid var(--border)}
.sbadge{display:inline-flex;align-items:center;gap:.4rem;padding:.35rem .9rem;border-radius:50px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.sbadge.active{background:#e8f5e9;color:#2e7d32}
.sbadge.done{background:var(--bxl);color:var(--bx)}
.sbadge.paused{background:#fff3e0;color:#e65100}
.pw{flex:1;min-width:180px}
.plbl{font-size:.68rem;font-weight:600;color:var(--muted);margin-bottom:.4rem;display:flex;justify-content:space-between}
.pbar{height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--bx),#8b1a2e);border-radius:3px;transition:width .6s ease}
/* Summary cards */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}
.card{background:#fff;border-radius:14px;padding:1.25rem;border:1px solid var(--border)}
.card-lbl{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem}
.card-val{font-size:1.75rem;font-weight:700;letter-spacing:-.04em}
.card-unit{font-size:.78rem;color:var(--muted);margin-top:.1rem}
/* Extras: Materialien, Aufmass, Unterschrift */
.extras{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.extra-card{background:#fff;border-radius:14px;padding:1.25rem;border:1px solid var(--border)}
.extra-title{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
.mat-item{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:.83rem}
.mat-item:last-child{border:none}
.mat-name{font-weight:600}
.mat-qty{color:var(--muted);font-size:.78rem}
.aufmass-item{font-size:.83rem;padding:.4rem 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.aufmass-item:last-child{border:none}
.sig-wrap{margin-top:.5rem;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--bg)}
.sig-wrap img{width:100%;height:80px;object-fit:contain}
.sig-date{font-size:.7rem;color:var(--muted);margin-top:.4rem}
/* Timeline */
.tl{position:relative}
.tl::before{content:'';position:absolute;left:18px;top:0;bottom:0;width:2px;background:var(--border)}
.tl-entry{position:relative;padding-left:54px;margin-bottom:2.5rem}
.tl-dot{position:absolute;left:10px;top:4px;width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid var(--border);z-index:1}
.tl-entry.completed .tl-dot{background:var(--bx);border-color:var(--bx)}
.tl-entry.active .tl-dot{border-color:var(--bx);box-shadow:0 0 0 4px rgba(74,14,26,.1)}
.tl-date{font-size:.66rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem}
.tl-card{background:#fff;border-radius:14px;padding:1.5rem;border:1px solid var(--border)}
.tl-entry.active .tl-card{border-color:rgba(74,14,26,.2);box-shadow:0 4px 16px rgba(74,14,26,.06)}
.tl-phase{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--bx);margin-bottom:.35rem}
.tl-title{font-size:1.05rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.5rem}
.tl-desc{font-size:.86rem;color:var(--muted);line-height:1.7;margin-bottom:1.25rem}
.tl-meta{display:flex;gap:1.25rem;flex-wrap:wrap;padding:.9rem 1rem;background:var(--bg);border-radius:10px;margin-bottom:1rem}
.tl-mi{display:flex;align-items:center;gap:.4rem;font-size:.78rem}
.tl-ml{color:var(--muted)}
.tl-mv{font-weight:600}
/* Fotos */
.foto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem;margin-top:1rem}
.foto-item{border-radius:10px;overflow:hidden;aspect-ratio:4/3;cursor:pointer;background:#f0f0f0;position:relative}
.foto-item img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.foto-item:hover img{transform:scale(1.05)}
.foto-cap{position:absolute;bottom:0;left:0;right:0;padding:.35rem .6rem;background:linear-gradient(transparent,rgba(0,0,0,.65));color:#fff;font-size:.65rem;font-weight:600}
/* Polycam video */
.polycam-wrap{margin-top:1rem;border-radius:12px;overflow:hidden;background:#000;border:1px solid rgba(0,0,0,.1)}
.polycam-header{background:#0a0a0a;padding:.65rem 1rem;display:flex;align-items:center;gap:.5rem}
.polycam-lbl{font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.polycam-link{margin-left:auto;font-size:.65rem;color:rgba(255,255,255,.35);text-decoration:none}
.polycam-link:hover{color:#fff}
.polycam-video{width:100%;display:block;max-height:400px;object-fit:cover}
/* Comments */
.comments{margin-top:1.25rem;border-top:1px solid var(--border);padding-top:1rem}
.comment{display:flex;gap:.65rem;margin-bottom:.75rem}
.comment-av{width:26px;height:26px;border-radius:50%;background:var(--bx);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;flex-shrink:0}
.comment-body{flex:1}
.comment-meta{font-size:.65rem;color:var(--muted);margin-bottom:.2rem}
.comment-text{font-size:.82rem;line-height:1.6;background:var(--bg);padding:.55rem .8rem;border-radius:0 8px 8px 8px}
/* Lightbox */
.lb-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center}
.lb-bg.show{display:flex}
.lb-bg img{max-width:92vw;max-height:88vh;border-radius:8px;object-fit:contain}
.lb-close{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,.1);border:none;color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:none;color:#fff;width:48px;height:48px;border-radius:50%;cursor:pointer;font-size:1.75rem;display:flex;align-items:center;justify-content:center;transition:background .2s}
.lb-nav:hover{background:rgba(255,255,255,.25)}
.lb-prev{left:1rem}
.lb-next{right:1rem}
/* PDF btn */
.pdf-btn{position:fixed;bottom:2rem;left:2rem;background:var(--ink);color:#fff;border:none;border-radius:50px;padding:.65rem 1.25rem;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:100;display:none;align-items:center;gap:.5rem;transition:background .15s}
.pdf-btn:hover{background:var(--bx)}
@media(max-width:600px){
  .cards{grid-template-columns:repeat(2,1fr)}
  .extras{grid-template-columns:1fr}
  .tl-entry{padding-left:40px}
  .tl::before{left:12px}
  .tl-dot{left:4px}
}
@media print{
  .pdf-btn,.lw{display:none!important}
  .mw{display:block!important;padding:0}
}
</style>
</head>
<body>

<!-- Login -->
<div class="lw" id="lw">
  <div class="lb">
    <img src="/assets/img/PolyCoreLogo.png" alt="POLYCORE"/>
    <h2>Projektbericht</h2>
    <p>Bitte geben Sie das Passwort ein, das Sie von POLYCORE GmbH erhalten haben.</p>
    <input class="fi" type="password" id="pw-input" placeholder="Passwort eingeben..."/>
    <button class="btnp" id="pw-btn">Bericht öffnen</button>
    <div class="lerr" id="pw-err">Falsches Passwort. Bitte erneut versuchen.</div>
  </div>
</div>

<!-- Report -->
<div class="mw" id="mw"></div>

<!-- Lightbox Galerija -->
<div class="lb-bg" id="lightbox">
  <button class="lb-close" id="lb-close">✕</button>
  <button class="lb-nav lb-prev" id="lb-prev">&#8249;</button>
  <div style="display:flex;flex-direction:column;align-items:center;gap:.75rem;max-width:92vw">
    <img id="lb-img" src="" alt="" style="max-width:92vw;max-height:80vh;border-radius:8px;object-fit:contain"/>
    <div id="lb-caption" style="color:rgba(255,255,255,.6);font-size:.8rem;text-align:center"></div>
    <div id="lb-counter" style="color:rgba(255,255,255,.35);font-size:.72rem"></div>
  </div>
  <button class="lb-nav lb-next" id="lb-next">&#8250;</button>
</div>

<!-- PDF -->
<button class="pdf-btn" id="pdf-btn" onclick="window.print()">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
  PDF exportieren
</button>

<script>
var P = window.PROJEKT_DATA || null;
var galerie = []; // sve slike trenutnog projekta
var galIdx = 0;

document.getElementById('pw-btn').addEventListener('click', checkPW);
document.getElementById('pw-input').addEventListener('keydown', function(e){ if(e.key==='Enter') checkPW(); });
document.getElementById('lb-close').addEventListener('click', closeLB);
document.getElementById('lb-prev').addEventListener('click', function(){ navLB(-1); });
document.getElementById('lb-next').addEventListener('click', function(){ navLB(1); });
document.getElementById('lightbox').addEventListener('click', function(e){ if(e.target===this) closeLB(); });
document.addEventListener('keydown', function(e){
  if(e.key==='Escape') closeLB();
  else if(e.key==='ArrowLeft') navLB(-1);
  else if(e.key==='ArrowRight') navLB(1);
});

function checkPW() {
  if (!P) { alert('Keine Projektdaten.'); return; }
  if (document.getElementById('pw-input').value === P.passwort) {
    document.getElementById('lw').style.display = 'none';
    document.getElementById('pdf-btn').style.display = 'flex';
    // Sakupi sve slike projekta za galeriju
    galerie = [];
    P.etappen.forEach(function(e){
      (e.fotos||[]).forEach(function(f){ galerie.push(f); });
    });
    render();
  } else {
    document.getElementById('pw-err').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function openLB(idx){
  galIdx = idx;
  showLBSlide();
  document.getElementById('lightbox').classList.add('show');
}

// Lokalna galerija po etapi
var _localGal = [];
function openLBLocal(galId, idx) {
  _localGal = (window._galerien && window._galerien[galId]) || [];
  galIdx = idx;
  showLBLocalSlide();
  document.getElementById('lightbox').classList.add('show');
}
function showLBLocalSlide(){
  var f = _localGal[galIdx];
  if(!f) return;
  document.getElementById('lb-img').src = f.url;
  document.getElementById('lb-caption').textContent = f.caption || '';
  document.getElementById('lb-counter').textContent = (galIdx+1) + ' / ' + _localGal.length;
  document.getElementById('lb-prev').style.display = _localGal.length > 1 ? 'flex' : 'none';
  document.getElementById('lb-next').style.display = _localGal.length > 1 ? 'flex' : 'none';
}
function showLBSlide(){
  var f=galerie[galIdx];
  if(!f) return;
  document.getElementById('lb-img').src=f.url;
  document.getElementById('lb-caption').textContent=f.caption||'';
  document.getElementById('lb-counter').textContent=(galIdx+1)+' / '+galerie.length;
  document.getElementById('lb-prev').style.display=galerie.length>1?'flex':'none';
  document.getElementById('lb-next').style.display=galerie.length>1?'flex':'none';
}
function navLB(dir){
  if(_localGal.length > 0) {
    galIdx = (galIdx + dir + _localGal.length) % _localGal.length;
    showLBLocalSlide();
  } else {
    galIdx = (galIdx + dir + galerie.length) % galerie.length;
    showLBSlide();
  }
}
function closeLB(){ document.getElementById('lightbox').classList.remove('show'); _localGal = []; }

function render() {
  var p = P;
  var totalH = p.etappen.reduce(function(s,e){ return s+(e.stunden||0); }, 0);
  var doneN = p.etappen.filter(function(e){ return e.status==='completed'; }).length;
  var prog = p.etappen.length ? Math.round(doneN/p.etappen.length*100) : 0;
  var statusLbl = {active:'In Ausführung',done:'Abgeschlossen',paused:'Pausiert'}[p.status]||p.status;
  var totalFotos = p.etappen.reduce(function(s,e){ return s+((e.fotos||[]).length); }, 0);

  var materialsHtml = '';
  if (p.materialien && p.materialien.length) {
    materialsHtml = '<div class="extra-card"><div class="extra-title">Materialien & Mengen</div>' +
      p.materialien.map(function(m){
        return '<div class="mat-item"><span class="mat-name">'+m.name+'</span><span class="mat-qty">'+m.menge+' '+m.einheit+'</span></div>';
      }).join('') + '</div>';
  }

  var aufmassHtml = '';
  if (p.aufmass && p.aufmass.length) {
    aufmassHtml = '<div class="extra-card"><div class="extra-title">Aufmaß</div>' +
      p.aufmass.map(function(a){
        return '<div class="aufmass-item"><span>'+a.bezeichnung+'</span><span style="font-weight:600">'+a.wert+' '+a.einheit+'</span></div>';
      }).join('') + '</div>';
  }

  var extrasHtml = (materialsHtml||aufmassHtml) ?
    '<div class="extras">'+materialsHtml+aufmassHtml+'</div>' : '';

  var sigHtml = '';
  if (p.unterschrift) {
    sigHtml = '<div class="extra-card" style="margin-bottom:1.5rem"><div class="extra-title">Abnahme / Unterschrift</div>' +
      '<div class="sig-wrap"><img src="'+p.unterschrift+'" alt="Unterschrift"/></div>' +
      '<div class="sig-date">Unterzeichnet: '+(p.unterschrift_datum||'')+'</div></div>';
  }

  document.getElementById('mw').innerHTML =
    '<div class="rh">' +
      '<img src="/assets/img/1PolyCoreLogo.png" alt="POLYCORE"/>' +
      '<div class="rh-eye">Projektbericht · POLYCORE GmbH</div>' +
      '<div class="rh-title">'+(p.titel||'')+'</div>' +
      '<div class="rh-client">Auftraggeber: <strong>'+(p.kunde||'—')+'</strong></div>' +
      '<div class="rh-meta">' +
        '<div class="rh-mi"><span class="rh-ml">Objekt</span><span class="rh-mv">'+(p.objekt||'—')+'</span></div>' +
        '<div class="rh-mi"><span class="rh-ml">Startdatum</span><span class="rh-mv">'+(p.startdatum||'—')+'</span></div>' +
        '<div class="rh-mi"><span class="rh-ml">Fläche</span><span class="rh-mv">'+(p.flaeche||'—')+'</span></div>' +
        '<div class="rh-mi"><span class="rh-ml">System</span><span class="rh-mv">'+(p.system||'—')+'</span></div>' +
      '</div>' +
    '</div>' +
    '<div class="rs">' +
      '<span class="sbadge '+(p.status||'active')+'">'+statusLbl+'</span>' +
      '<div class="pw">' +
        '<div class="plbl"><span>Fortschritt</span><span>'+doneN+'/'+p.etappen.length+' Etappen</span></div>' +
        '<div class="pbar"><div class="pfill" style="width:'+prog+'%"></div></div>' +
      '</div>' +
    '</div>' +
    '<div class="cards">' +
      '<div class="card"><div class="card-lbl">Arbeitsstunden</div><div class="card-val">'+totalH+'</div><div class="card-unit">Stunden gesamt</div></div>' +
      '<div class="card"><div class="card-lbl">Etappen</div><div class="card-val">'+p.etappen.length+'</div><div class="card-unit">'+doneN+' abgeschlossen</div></div>' +
      '<div class="card"><div class="card-lbl">Fotos</div><div class="card-val">'+totalFotos+'</div><div class="card-unit">Dokumentiert</div></div>' +
    '</div>' +
    extrasHtml +
    sigHtml +
    '<div class="tl">' + p.etappen.map(renderEtappe).join('') + '</div>';

  document.getElementById('mw').style.display = 'block';
}

function renderEtappe(e, i) {
  var stLbl = {pending:'Ausstehend',active:'In Bearbeitung',completed:'Abgeschlossen'}[e.status||'pending'];

  var metaHtml = '<div class="tl-meta">';
  if (e.stunden) metaHtml += '<div class="tl-mi"><span class="tl-ml">Stunden:</span><span class="tl-mv">'+e.stunden+'h</span></div>';
  if (e.mitarbeiter) metaHtml += '<div class="tl-mi"><span class="tl-ml">Team:</span><span class="tl-mv">'+e.mitarbeiter+'</span></div>';
  if (e.material) metaHtml += '<div class="tl-mi"><span class="tl-ml">Material:</span><span class="tl-mv">'+e.material+'</span></div>';
  metaHtml += '</div>';

  var fotosHtml = '';
  if (e.fotos && e.fotos.length) {
    fotosHtml = '<div class="foto-grid">' +
      e.fotos.map(function(f){
        return '<div class="foto-item" onclick="openLB(\''+f.url+'\')"><img src="'+f.url+'" alt="" loading="lazy"/>'+(f.caption?'<div class="foto-cap">'+f.caption+'</div>':'')+'</div>';
      }).join('') + '</div>';
  }

  var polycamHtml = '';
  if (e.obj_url) {
    var id = '';
    if (e.obj_url.indexOf('poly.cam/capture/') !== -1) {
      id = e.obj_url.split('poly.cam/capture/')[1].replace(/\/.*/, '').replace(/\?.*/, '');
    }
    if (id) {
      polycamHtml = '<div class="polycam-wrap">' +
        '<div class="polycam-header">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>' +
          '<span class="polycam-lbl">3D-Scan · Polycam</span>' +
          '<a href="'+e.obj_url+'" target="_blank" class="polycam-link">Vollbild ↗</a>' +
        '</div>' +
        '<a href="'+e.obj_url+'" target="_blank" rel="noopener" style="display:block;text-decoration:none;position:relative">'+
            '<img src="https://poly.cam/api/capture/'+id+'/artifacts/thumbnail.jpg" style="width:100%;height:320px;object-fit:cover;display:block;" loading="lazy" alt="3D Scan"/>'+
            '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35)">'+
              '<div style="background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1.5px solid rgba(255,255,255,.3);border-radius:50px;padding:.65rem 1.5rem;display:flex;align-items:center;gap:.65rem;color:#fff;font-family:inherit;font-size:.85rem;font-weight:700">'+
                '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.75"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>'+
                '3D-Modell in Polycam öffnen'+
              '</div>'+
            '</div>'+
          '</a>' +
      '</div>';
    }
  }

  var commentsHtml = '';
  if (e.kommentare && e.kommentare.length) {
    commentsHtml = '<div class="comments">' +
      e.kommentare.map(function(k){
        return '<div class="comment"><div class="comment-av">PC</div><div class="comment-body"><div class="comment-meta">'+(k.datum||'')+'</div><div class="comment-text">'+k.text+'</div></div></div>';
      }).join('') + '</div>';
  }

  return '<div class="tl-entry '+(e.status||'')+'">' +
    '<div class="tl-dot"></div>' +
    '<div class="tl-date">'+(e.datum||'')+'</div>' +
    '<div class="tl-card">' +
      '<div class="tl-phase">Etappe '+(i+1)+'</div>' +
      '<div class="tl-title">'+(e.titel||'')+'</div>' +
      (e.beschreibung?'<div class="tl-desc">'+e.beschreibung+'</div>':'') +
      metaHtml + fotosHtml + polycamHtml + commentsHtml +
    '</div>' +
  '</div>';
}
</script>
</body>
</html>
