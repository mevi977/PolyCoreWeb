"einheit":"m"},{"bezeichnung":"Kratzspachtelung ","wert":"150","einheit":"m²"}],"regie_tage":[{"datum":"2026-05-08","beschreibung":"Entfernung der vorhandenen Elektroinstallation aus dem Untergrund. Vorhandene Risse wurden mittels Winkelschleifer aufgeschnitten, gereinigt und anschliessend mit Epoxidharz-Bindemittel vergossen. Hohlstellen wurden aufgebrochen und zusammen mit den vorhandenen Löchern und Ausbrüchen mit Epoxidharzmörtel fachgerecht verfüllt und bündig abgezogen.","stunden":"9","mitarbeiter":"Mevludin Icic"},{"datum":"2026-05-11","beschreibung":"Vollflächige Einarbeitung von Glasfasern (Kurzschnittfasern) in die frische Grundierungsschicht zur Rissüberbrückung und Verstärkung des Untergrundes. An Fugen und Anschlussbereichen wurde zusätzlich Sikagard® Spezialgewebe nass in nass eingebettet zur gezielten Verstärkung der gefährdeten Bereiche.","stunden":"1","mitarbeiter":"Mevludin Icic"},{"datum":"2026-05-12","beschreibung":"Aufgrund des stark saugenden Untergrundes sowie erheblicher Unebenheiten wurden zusätzliche Arbeiten erforderlich. Die ausgeprägten Unebenheiten wurden maschinell abgeschliffen. Anschliessend wurde eine zusätzliche Kratzspachtelung mit Sikafloor-151 als kombinierten Arbeitsgang (Grundierung und Porenschluss in einem) ausgeführt, da der Untergrund die erste Grundierung stark aufgesogen hatte und eine weitere Schicht als Vorbereitung für den nachfolgenden Einstreubelag erforderlich war. Diese Mehrleistungen wurden als Regiearbeit ausgeführt und werden separat verrechnet.","stunden":"1.5","mitarbeiter":"Mevludin Icic"}]};</script></head>
<body>

<div class="screen" id="screen-load" style="background:var(--ink)">
  <div class="lbox">
    <div class="spin"></div>
    <p style="color:var(--muted);font-size:.85rem">Wird geladen...</p>
  </div>
</div>

<div class="screen" id="screen-notfound" style="display:none">
  <div class="lbox">
    <img src="/assets/img/PolyCoreLogo.png" alt="POLYCORE"/>
    <h2>Projekt nicht gefunden</h2>
    <p>Der angeforderte Projektbericht existiert nicht oder der Link ist ungültig.</p>
  </div>
</div>

<div class="screen" id="screen-login" style="display:none">
  <div class="lbox">
    <img src="/assets/img/PolyCoreLogo.png" alt="POLYCORE"/>
    <h2>Projektbericht</h2>
    <p>Bitte geben Sie das Passwort ein, das Sie von POLYCORE GmbH erhalten haben.</p>
    <input class="fi" type="password" id="pw" placeholder="Passwort eingeben..."/>
    <button class="btnp" id="pw-btn">Bericht öffnen</button>
    <div class="lerr" id="pw-err">Falsches Passwort. Bitte erneut versuchen.</div>
  </div>
</div>

<div class="mw" id="mw"></div>

<div class="lbox-bg" id="lbg">
  <button class="lbox-x" id="lbx">✕</button>
  <button class="lbox-p" id="lbp">&#8249;</button>
  <div style="display:flex;flex-direction:column;align-items:center">
    <img class="lbox-img" id="lbi" src="" alt=""/>
    <div class="lbox-cap" id="lbc"></div>
    <div class="lbox-cnt" id="lbct"></div>
  </div>
  <button class="lbox-n" id="lbn">&#8250;</button>
</div>

<button class="pdf-btn" id="pdf-btn" onclick="window.print()">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
  PDF
</button>


<script>
var LB = {fotos:[], idx:0};
var P = null;

// Citaj slug iz URL-a: /bericht/mrelag ili ?p=mrelag
var slug = '';
var path = window.location.pathname;
var match = path.match(/\/bericht\/([^\/\?#]+)/);
if(match) slug = match[1];
if(!slug) slug = new URLSearchParams(window.location.search).get('p') || '';

// Lightbox
document.getElementById('lbx').onclick = closeLB;
document.getElementById('lbp').onclick = function(){navLB(-1);};
document.getElementById('lbn').onclick = function(){navLB(1);};
document.getElementById('lbg').onclick = function(e){if(e.target===this)closeLB();};
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')closeLB();
  else if(e.key==='ArrowLeft')navLB(-1);
  else if(e.key==='ArrowRight')navLB(1);
});
function openLB(fotos,idx){LB={fotos:fotos,idx:idx};updateLB();document.getElementById('lbg').classList.add('open');document.body.style.overflow='hidden';}
function closeLB(){document.getElementById('lbg').classList.remove('open');document.body.style.overflow='';}
function navLB(d){LB.idx=(LB.idx+d+LB.fotos.length)%LB.fotos.length;updateLB();}
function updateLB(){
  var f=LB.fotos[LB.idx];
  document.getElementById('lbi').src=f.url;
  document.getElementById('lbc').textContent=f.caption||'';
  document.getElementById('lbct').textContent=(LB.idx+1)+' / '+LB.fotos.length;
  document.getElementById('lbp').style.display=LB.fotos.length>1?'flex':'none';
  document.getElementById('lbn').style.display=LB.fotos.length>1?'flex':'none';
}

// Ucitaj podatke
if(!slug || slug === 'index') {
  show('screen-notfound');
} else {
  // Koristimo JSDelivr koji ima kratki cache (10 min) ali podrzava purge
  // i GitHub API s random parametrom da zaobidemo browser cache
  // init - vidi na kraju skripte
}

function show(id){
  ['screen-load','screen-notfound','screen-login'].forEach(function(s){
    document.getElementById(s).style.display='none';
  });
  var el=document.getElementById(id);
  if(el) el.style.display='flex';
}

function checkPW(){
  if(document.getElementById('pw').value===P.passwort){
    show('screen-load');
    document.getElementById('screen-load').style.display='none';
    document.getElementById('pdf-btn').style.display='flex';
    render();
  } else {
    document.getElementById('pw-err').style.display='block';
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}

function render(){
  var p=P;
  var totalH=p.etappen.reduce(function(s,e){return s+(+e.stunden||0);},0);
  var doneN=p.etappen.filter(function(e){return e.status==='completed';}).length;
  var prog=p.etappen.length?Math.round(doneN/p.etappen.length*100):0;
  var totalF=p.etappen.reduce(function(s,e){return s+((e.fotos||[]).filter(function(f){return f.url;}).length);},0);
  var stMap={active:'In Ausführung',done:'Abgeschlossen',paused:'Pausiert'};

  var matHtml='';
  if(p.materialien&&p.materialien.filter(function(m){return m.name;}).length){
    matHtml='<div class="extra-box"><div class="extra-ttl">Materialien &amp; Mengen</div>'+
      p.materialien.filter(function(m){return m.name;}).map(function(m){
        return '<div class="extra-row"><span class="extra-key">'+m.name+'</span><span class="extra-val">'+m.menge+' '+m.einheit+'</span></div>';
      }).join('')+'</div>';
  }
  var amHtml='';
  if(p.aufmass&&p.aufmass.filter(function(a){return a.bezeichnung;}).length){
    amHtml='<div class="extra-box"><div class="extra-ttl">Aufmaß</div>'+
      p.aufmass.filter(function(a){return a.bezeichnung;}).map(function(a){
        return '<div class="extra-row"><span class="extra-key">'+a.bezeichnung+'</span><span class="extra-val">'+a.wert+' '+a.einheit+'</span></div>';
      }).join('')+'</div>';
  }
  var regieHtml='';
  if(p.regie_tage&&p.regie_tage.filter(function(r){return r.beschreibung||r.stunden;}).length){
    var rt=p.regie_tage.filter(function(r){return r.beschreibung||r.stunden;});
    var regT=rt.reduce(function(s,r){return s+(+r.stunden||0);},0);
    regieHtml='<div class="extra-box" style="grid-column:1/-1"><div class="extra-ttl">Regie-Tagesbericht ('+regT+'h gesamt)</div>'+
      rt.map(function(r){
        return '<div class="extra-row"><span class="extra-key">'+r.datum+(r.beschreibung?' · '+r.beschreibung:'')+(r.mitarbeiter?' · '+r.mitarbeiter:'')+'</span><span class="extra-val">'+(r.stunden||0)+'h</span></div>';
      }).join('')+'</div>';
  }
  var extrasHtml=(matHtml||amHtml||regieHtml)?'<div class="extras-grid">'+matHtml+amHtml+regieHtml+'</div>':'';

  var html=
    '<div class="rh">'+
      '<img src="/assets/img/1PolyCoreLogo.png" alt="POLYCORE"/>'+
      '<div class="rh-eye">Projektbericht · POLYCORE GmbH</div>'+
      '<div class="rh-title">'+(p.titel||'')+'</div>'+
      '<div class="rh-client">Auftraggeber: <strong>'+(p.kunde||'—')+'</strong></div>'+
      '<div class="rh-meta">'+
        mkM('Objekt',p.objekt)+mkM('Startdatum',p.startdatum)+mkM('Fläche',p.flaeche)+mkM('System',p.system)+
      '</div>'+
    '</div>'+
    '<div class="rs">'+
      '<span class="sbadge '+(p.status||'active')+'">'+(stMap[p.status]||'—')+'</span>'+
      '<div class="pw"><div class="plbl"><span>Fortschritt</span><span>'+doneN+'/'+p.etappen.length+' Arbeitsschritte</span></div>'+
      '<div class="pbar"><div class="pfill" style="width:'+prog+'%"></div></div></div>'+
    '</div>'+
    '<div class="cards">'+
      mkC('Arbeitsstunden',totalH,'Stunden gesamt')+
      mkC('Arbeitsschritte',p.etappen.length,doneN+' abgeschlossen')+
      mkC('Fotos',totalF,'Dokumentiert')+
    '</div>'+
    extrasHtml+
    '<div class="tl">'+p.etappen.map(renderEt).join('')+'</div>';

  document.getElementById('mw').innerHTML=html;
  document.getElementById('mw').style.display='block';
}

function mkM(l,v){return '<div class="rh-mi"><span class="rh-ml">'+l+'</span><span class="rh-mv">'+(v||'—')+'</span></div>';}
function mkC(l,v,u){return '<div class="card"><div class="card-lbl">'+l+'</div><div class="card-val">'+v+'</div><div class="card-unit">'+u+'</div></div>';}

function renderEt(e,i){
  var fotos=(e.fotos||[]).filter(function(f){return f.url;});
  var stL={pending:'Ausstehend',active:'In Bearbeitung',completed:'Abgeschlossen'};

  var fotosHtml='';
  if(fotos.length){
    var fs=JSON.stringify(fotos);
    fotosHtml='<div class="foto-grid">'+
      fotos.map(function(f,fi){
        return '<div class="foto-item" onclick=\'openLB('+fs+','+fi+')\'>'+
          '<img src="'+f.url+'" alt="" loading="lazy"/>'+
          (f.caption?'<div class="foto-cap">'+f.caption+'</div>':'')+
        '</div>';
      }).join('')+'</div>';
  }

  var pcamHtml='';
  if(e.obj_url&&e.obj_url.indexOf('poly.cam/capture/')!==-1){
    var id=e.obj_url.split('poly.cam/capture/')[1].replace(/[/?#].*/,'');
    var thumb='https://poly.cam/api/capture/'+id+'/artifacts/thumbnail.jpg';
    pcamHtml='<div class="pcam">'+
      '<div class="pcam-hd"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>'+
      '<span class="pcam-lbl">3D-Scan · Polycam</span>'+
      '<a href="'+e.obj_url+'" target="_blank" class="pcam-link">Vollbild ↗</a></div>'+
      '<img class="pcam-thumb" src="'+thumb+'" alt="3D Scan" loading="lazy"/>'+
      '<a href="'+e.obj_url+'" target="_blank" class="pcam-btn">'+
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>'+
        'Interaktives 3D-Modell öffnen</a></div>';
  }

  var kmtHtml='';
  if(e.kommentare&&e.kommentare.length){
    kmtHtml='<div class="kmts">'+e.kommentare.map(function(k){
      return '<div class="kmt"><div class="kmt-av">PC</div>'+
        '<div><div class="kmt-meta">'+(k.datum||'')+'</div><div class="kmt-text">'+k.text+'</div></div></div>';
    }).join('')+'</div>';
  }

  return '<div class="tle '+(e.status||'')+'">'+
    '<div class="tld"></div>'+
    '<div class="tl-dt">'+(e.datum||'')+'</div>'+
    '<div class="tl-card">'+
      '<div class="tl-phase">Arbeitsschritt '+(i+1)+' · '+(stL[e.status]||'')+'</div>'+
      '<div class="tl-name">'+(e.titel||'')+'</div>'+
      (e.beschreibung?'<div class="tl-desc">'+e.beschreibung+'</div>':'')+
      '<div class="tl-meta">'+
        (e.stunden?'<div class="tl-mi"><span class="tl-ml">Stunden:</span><span class="tl-mv">'+e.stunden+'h</span></div>':'')+
        (e.mitarbeiter?'<div class="tl-mi"><span class="tl-ml">Team:</span><span class="tl-mv">'+e.mitarbeiter+'</span></div>':'')+
        (e.material?'<div class="tl-mi"><span class="tl-ml">Material:</span><span class="tl-mv">'+e.material+'</span></div>':'')+
      '</div>'+
      fotosHtml+pcamHtml+kmtHtml+
    '</div></div>';
}
